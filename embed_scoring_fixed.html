<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>7-Pillar Continuity Analysis</title>
<style>
:root{--bg:#0d0d0c;--card:#151412;--gold:#e3cf8a;--line:#312b20;--txt:#f3efe6}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--txt);font-family:Georgia,serif}
.wrap{max-width:960px;margin:auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:28px}
h1,h2,h3{color:var(--gold)} .progress{height:10px;background:#221f19;border-radius:999px;overflow:hidden;margin:16px 0 24px}
.bar{height:100%;background:var(--gold)} .item{display:flex;justify-content:space-between;gap:20px;align-items:center;border:1px solid var(--line);padding:16px;border-radius:16px;margin:12px 0}
.opts{display:flex;gap:10px}.opt{padding:10px 14px;border:1px solid #555;border-radius:999px;cursor:pointer}
.active{border-color:var(--gold)!important;box-shadow:0 0 16px rgba(227,207,138,.45)}
button{width:100%;padding:14px;border:0;border-radius:14px;background:var(--gold);font-weight:700}
.ring{width:220px;height:220px;border-radius:50%;margin:20px auto;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(227,207,138,.4)}
input{width:100%;padding:12px;margin:8px 0;background:#111;color:#fff;border:1px solid #444;border-radius:10px}
@media(max-width:700px){.item{flex-direction:column;align-items:flex-start}}
</style></head><body>
<div class="wrap"><div id="app" class="card"></div></div>
<script>
const pillars=[
["Digital Life",["Primary Email Access","Password Manager","Cloud Storage","2-Factor Authentication Recovery Methods","Social Media Access","Digital Archive"]],
["Financial & Assets",["Banking & Credit Access","Investment & Retirement Accounts","Cryptocurrency Wallets & Keys","Income Sources Documentation","Recurring Bills & Subscriptions","Emergency Financial Instructions"]],
["Household & Property",["Property Deeds & Titles","Vehicle Registrations","Home Maintenance Records","Utility Account Access","Security & Access Information","Household Inventory Documentation"]],
["Health & Medical",["Health Insurance Information","Medical Records & History","Prescription Medications List","Advance Directives","Emergency Contact Information","Healthcare Provider Information"]],
["Legal & Estate",["Last Will & Testament","Trust Documentation","Powers of Attorney","Life Insurance Policies","Business Entities","Estate Planning Documents"]],
["Business Continuity",["Business Entity Documents","Business Banking Access","Operating Agreements","Key Customer & Vendor Records","Critical Systems & Logins","Succession Planning"]],
["Legacy & Wishes",["Personal Letters & Messages","Ethical Will Statement","Funeral Preferences","Obituary Information","Family History & Stories","Personal Wishes & Instructions"]]
];
let step=0,biz=true,ans={};
function active(){return biz?pillars:pillars.filter(p=>p[0]!=="Business Continuity")}
function scoreData(){
 let recorded=0,na=0,total=active().length*6;
 Object.values(ans).forEach(v=>{if(v==="R") recorded++; if(v==="N") na++;});
 let applicable=Math.max(1,total-na);
 let score=Math.round((recorded/applicable)*100);
 let tier=score>=86?"Continuity Legend":score>=71?"Stable Continuity":score>=61?"Developing Continuity":"Legacy at Risk";
 return {score,tier,recorded,na,applicable};
}
function pick(k,v,el){
 ans[k]=v;
 el.parentNode.querySelectorAll('.opt').forEach(x=>x.classList.remove('active'));
 el.classList.add('active');
}
function render(){
 const app=document.getElementById('app');
 if(step===0){
  app.innerHTML=`<h1>7-Pillar Continuity Analysis</h1>
  <p>Select Recorded if documented. If it doesn't apply or you're unsure, select N/A. N/A items don't count against your score.</p>
  <label><input type="radio" name="b" checked onclick="biz=true"> Yes, I own a business</label><br>
  <label><input type="radio" name="b" onclick="biz=false"> No, I don't own a business</label><br><br>
  <button onclick="step=1;render()">Begin Analysis</button>`; return;
 }
 let p=active();
 if(step<=p.length){
  let idx=step-1;
  app.innerHTML=`<div>PILLAR ${step} OF ${p.length}</div><div class="progress"><div class="bar" style="width:${(idx/p.length)*100}%"></div></div><h2>${p[idx][0]}</h2>`;
  p[idx][1].forEach((t,i)=>{
   app.innerHTML+=`<div class="item"><div>${t}</div><div class="opts">
   <span class="opt" onclick="pick('${idx}_${i}','R',this)">Recorded</span>
   <span class="opt" onclick="pick('${idx}_${i}','N',this)">N/A</span>
   </div></div>`;
  });
  app.innerHTML+=`<button onclick="step++;window.scrollTo(0,0);render()">Continue</button>`; return;
 }
 let d=scoreData();
 app.innerHTML=`<div class="ring"><h1>${d.score}%</h1></div>
 <h2 style="text-align:center">${d.tier}</h2>
 <p style="text-align:center">Recorded: ${d.recorded} | N/A: ${d.na} | Applicable Items: ${d.applicable}</p>
 <p style="text-align:center">Most households score between 40% and 65%. Scores above 86% qualify as Continuity Legend.</p>
 <input placeholder="First Name"><input placeholder="Email Address">
 <button>REQUEST MY FULL ANALYSIS</button>`;
}
render();
</script></body></html>
