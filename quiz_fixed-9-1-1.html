/* ============================================
   PERFORMANCE & ACCESSIBILITY BASE STYLES
   ============================================ */
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

/* Focus visible for keyboard navigation */
:focus-visible{
  outline:2px solid var(--accent-gold);
  outline-offset:2px;
}

/* Skip link for accessibility */
.skip-link{
  position:absolute;
  top:-40px;
  left:0;
  background:var(--accent-gold);
  color:var(--bg-dark);
  padding:8px 16px;
  z-index:10000;
  text-decoration:none;
  font-family:'Cinzel',serif;
  font-size:14px;
  font-weight:600;
}
.skip-link:focus{
  top:0;
}

/* Smooth scrolling */
html{font-size:22.3146px;background:#0f0c08;}

/* Selection styling */
::selection{
  background:rgba(31, 77, 58, 0.3);
  color:var(--text-primary);
}

/* Hide Carrd's parent logo on landing page */
body:not(.has-logo)::before,
body:not(.has-logo)::after,
.logo-container,
.site-logo,
img[src*="Logos/Correct.png"]:not(.company-logo),
img[alt*="Legacy Architect"]:not(.company-logo) {
  display: none !important;
}
html{font-size:22.3146px;}
body{margin:0;background:#0f0c08;color:#efe9df;font-family:'Lora',serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;overflow-y:visible;line-height:1.6;}

  max-width:1000px;

}

.card::before{

}

  content:"";

/* ============================================

/* Touch target improvements */
.toggle{
  min-height:56px;
  padding:14px 10px;

}
.toggle:last-child{margin-bottom:0;}
.trow{

}
.opt{

  padding:12px 16px;

  transition:all var(--transition-normal);
  border:2px solid #1A1A1A !important;
  border-radius:3px;
  background:#1c1712;
  font-weight:500;
}
.opt:hover,
.opt:focus{
  transform:translateY(-1px);
  box-shadow:0 2px 8px rgba(31, 77, 58, 0.2);
}
.opt:active{
  transform:translateY(0);
}

/* Form input improvements for mobile */
.inputfield input{
  min-height:48px;
  font-size:15px;
  padding:14px 16px;
  background:#1c1712 !important;
  color:var(--text-primary) !important;
}
.inputfield input:focus{
  outline:none;
  border-color:var(--accent-gold);
  box-shadow:0 0 0 3px rgba(31, 77, 58, 0.15);
}

/* Button touch targets */
button{
  min-height:48px;
  min-width:140px;
  transition:all var(--transition-normal);
}
button:active{
  transform:scale(0.98);
}

/* Progress indicator */
.progress-container{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:4px;
  background:rgba(31, 77, 58, 0.1);
  z-index:1000;
  display:none;
}
.progress-container.visible{
  display:block;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg, var(--accent-gold-dark), var(--accent-gold), var(--accent-gold-light));
  width:0%;
  transition:width var(--transition-slow);
}

/* STEP MARKS - Elegant */
.stepbar{
  display:flex;
  gap:6px;
  margin-bottom:30px;
  height:2px;
}
.seg{
  flex:1;
  height:100%;
  background:var(--text-muted);
  border-radius:1px;
  transition:all 0.4s ease;
}
.seg.done{background:var(--forest);}
.seg.active{
  background:linear-gradient(90deg,var(--accent-gold),var(--accent-gold-light),var(--accent-gold));
  background-size:200% 100%;
  animation:shimmer 3s linear infinite;
  box-shadow:0 0 12px var(--subtle-glow);
}
/* ANIMATIONS - Subtle & Elegant */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes barRise{from{transform:scaleX(0);opacity:0;}to{transform:scaleX(1);opacity:1;}}
@keyframes ringGlow{0%,100%{box-shadow:0 0 10px var(--ring-glow);}50%{box-shadow:0 0 20px var(--ring-glow),0 0 30px var(--ring-glow);}}

@keyframes btnHover{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes modalFadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes modalSlideIn{from{transform:translateY(-20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* SHARE MODAL - Premium Design */
.share-modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(26,42,34,0.6);backdrop-filter:blur(3px);z-index:1000;align-items:center;justify-content:center;}

/* Company Logo */

  color:var(--accent-gold);
  background:transparent;

.opt:hover{
  border-color:var(--accent-gold);

.opt:active{
  transform:translateY(0);
}
.opt{

}
.opt:hover,.opt:focus{

}
.opt.oR{
  border-color:var(--recorded) !important;
  color:#fff !important;
  background:var(--recorded) !important;
  box-shadow:0 0 0 2px var(--recorded), 0 0 18px rgba(26,122,74,0.6) !important;
  transform:translateY(-1px);
}
.opt.oU{
  border-color:var(--missing) !important;
  color:#fff !important;
  background:var(--missing) !important;
  box-shadow:0 0 0 2px var(--missing), 0 0 18px rgba(184,50,50,0.6) !important;
  transform:translateY(-1px);
}
.opt.oN{
  border-color:#B8922A !important;
  color:#fff !important;
  background:#B8922A !important;
  box-shadow:0 0 0 2px #B8922A, 0 0 18px rgba(184,146,42,0.6) !important;

/* COUNTER CIRCLE - Elegant */
.counter{text-align:center;margin:16px 0 24px;}
.counter-circle{
  display:inline-block;
  padding:8px 16px;
  background:rgba(31, 77, 58, 0.05);
  border:1px solid rgba(31, 77, 58, 0.4);
  border-radius:var(--radius-sm);
  font-family:'Cinzel',serif;
  font-size:14px;
  color:var(--accent-gold);
  letter-spacing:1.5px;
  box-shadow: 0 0 15px rgba(31, 77, 58, 0.3);
  font-weight:600;
  transition:all var(--transition-normal);
}
.counter-circle:hover{
  background:rgba(31, 77, 58, 0.1);
  border-color:var(--accent-gold);
}

/* Progress indicator in counter */
.counter-progress{
  font-size:11px;
  color:var(--text-secondary);
  margin-top:4px;
}

/* COMPLETE BADGE - Elegant */
.cpbadge{
  display:flex;align-items:center;gap:8px;margin-top:20px;
  font-size:13px;letter-spacing:2px;text-transform:uppercase;
  color:var(--accent-gold);
  font-family:'Cinzel',serif;
  font-weight:500;
}
.cpdot{
  width:5px;
  height:5px;
  border-radius:50%;

}
/* ============================================
   CONVERSION OPTIMIZATION STYLES
   ============================================ */

/* Primary CTA - More prominent */
.cta-primary{
  width:100%;
  padding:18.9px 24px;
  background:linear-gradient(145deg, #F4ECDC, #EADFC6, #F4ECDC);
  border:none;
  font-family:Cinzel,serif;
  font-weight:600;
  letter-spacing:3px;
  margin:28px 0 16px;
  cursor:pointer;
  font-size:14px;
  text-transform:uppercase;
  color:#1a1a2e;
  border-radius:var(--radius-sm);
  transition:all var(--transition-normal);
  box-shadow:0 4px 15px rgba(31, 77, 58, 0.3);
  border:1px solid #8A6E2A;
  position:relative;
  overflow:hidden;
}
.cta-primary::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition:left 0.5s ease;
}
.cta-primary:hover::before{
  left:100%;
}
.cta-primary:hover{
  background:linear-gradient(135deg, #143326, #1F4D3A, #2D6A4F);
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(31, 77, 58, 0.4);
}
.cta-primary:active{
  transform:translateY(0);
  box-shadow:0 2px 8px rgba(31, 77, 58, 0.3);
}

/* Secondary buttons */
button.alt{
  background:transparent;
  color:var(--accent-gold);
  border:1px solid rgba(31, 77, 58, 0.4);
  box-shadow:none;
}
button.alt:hover{
  color:var(--accent-gold);
  border-color:var(--accent-gold);
  background:rgba(31, 77, 58, 0.05);
}

/* Social proof/testimonial */
.social-proof{
  background:rgba(31, 77, 58, 0.03);
  border-left:3px solid #1F4D3A;
  padding:18.9px;
  margin:22px 0;

  font-size:20.4px;

}

/* Trust badges */

  display:flex;
  justify-content:center;
  gap:18.9px;
  margin:22px 0;
  flex-wrap:wrap;
}
.trust-badge{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:16.5px;
  color:#efe9df;
}
.trust-badge-icon{
  width:18.9px;
  height:18.9px;
  color:var(--accent-gold);
}

/* Tooltip styles */
.info-tooltip{
  position:relative;
  display:inline-block;
  cursor:help;
}
.info-icon{
  width:14px;
  height:14px;
  margin-left:4px;
  opacity:0.6;
  transition:opacity var(--transition-fast);
}
.info-tooltip:hover .info-icon{
  opacity:1;
}
.tooltip-content{
  position:absolute;
  bottom:auto;
  top:100%;
  margin-top:8px;
  left:0;
  right:auto;
  transform:none;
  background:#1F4D3A;
  color:#F4ECDC;
  padding:8px 12px;
  border-radius:var(--radius-sm);
  font-size:12px;
  white-space:normal;
  word-wrap:break-word;
  opacity:0;
  visibility:hidden;
  transition:all var(--transition-fast);
  z-index:1000;
  box-shadow:0 4px 12px rgba(20, 32, 26, 0.25);
  border:1px solid rgba(212, 175, 55, 0.3);
  width:max-content;
  max-width:240px;
  min-width:160px;
  text-align:center;
  line-height:1.4;
}
.info-tooltip:hover .tooltip-content{
  opacity:1;
  visibility:visible;
}

/* BUTTONS - Elegant */
button{
  width:100%;
  padding:16px 20px;
  background:linear-gradient(145deg, #F4ECDC, #EADFC6, #F4ECDC);

  font-family:Cinzel,serif;
  font-weight:600;
  letter-spacing:3px;

}
button::before{
  content:"";

}

  left:100%;
}
button:hover{
  background:linear-gradient(135deg, #143326, #1F4D3A, #2D6A4F);

}
button:hover{
  background:linear-gradient(145deg, #1F4D3A, #143326, #1F4D3A);

}
button:active{

  box-shadow:0 1px 4px rgba(31, 77, 58, 0.2);
}
button:disabled{opacity:0.4;cursor:not-allowed;}
button.start-btn{
  margin-top:30px;
  font-size:18.9px;
  padding:18.9px 24px;

  color:#1F4D3A;
}
button.sm{
  width:auto;
  padding:10px 16px;
  font-size:11px;
  margin-top:10px;

}
.navrow{
  display:flex;
  justify-content:space-between;

}
/* SCORE RING */
.ringwrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:16px 0 24px;
}
.ringlabel{
  font-family:Cinzel,serif;
  font-size:27px;

}
/* Moving cinemagraph glow wrapper for the readiness score circle */
.ring-glow-outer{
  position:relative;
  width:140px;
  height:140px;
  margin:0 auto 10px;
  border-radius:50%;
}
/* glow removed */

.ring{
  width:140px;
  height:140px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  border:none;
  background:#1c1712;
  overflow:hidden;
  margin:0;
  box-shadow:none;
  animation:float 4s ease-in-out infinite;
  z-index:1;
}
.ring::after{
  content:"";

  inset:8px;
  border-radius:50%;

  pointer-events:none;
}
.ringconic{position:absolute;inset:-42%;border-radius:50%;}
.ringinner{position:relative;z-index:2;text-align:center;}
.scorenum{

}
.scoresub{

}
.tierbadge{

.tD{color:#8B4513;}

}

}

}
/* PILLAR BARS */

// Analytics tracking
let analyticsEvents = [];

function trackEvent(eventName, data = {}) {
  analyticsEvents.push({
    timestamp: new Date().toISOString(),
    event: eventName,
    data: data,
    userAgent: navigator.userAgent,
    screenWidth: window.innerWidth,
    screenHeight: window.innerHeight
  });
  
  // Log to console for debugging
  console.log('Analytics:', eventName, data);
  
  // Send to analytics endpoint if available
  if (window.ga || window.gtag) {
    try {
      if (window.gtag) {
        gtag('event', eventName, data);
      } else if (window.ga) {
        ga('send', 'event', 'Analysis', eventName, JSON.stringify(data));
      }
    } catch (e) {
      console.log('Analytics error:', e);
    }
  }
}

function trackShare(platform) {

}

}

function copyForInstagram(text, btn) {
  let plain = text;
  try { if(/%[0-9A-Fa-f]{2}/.test(text)) plain = decodeURIComponent(text); } catch(e) {}
  function done() {
    const orig = btn.innerHTML;
    btn.innerHTML = '<svg class="share-icon" viewBox="0 0 24 24" fill="#E4405F"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><span>Copied!</span>';
    setTimeout(() => { btn.innerHTML = orig; }, 2000);
    setTimeout(() => { window.open('https://www.instagram.com/', '_blank'); }, 600);
  }
  if(navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(plain).then(done).catch(() => {
      const el = document.createElement('textarea');
      el.value = plain; el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
      document.body.appendChild(el); el.focus(); el.select();
      try { document.execCommand('copy'); done(); } catch(e) { prompt('Copy for Instagram:', plain); }
      document.body.removeChild(el);
    });
  } else {
    const el = document.createElement('textarea');
    el.value = plain; el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
    document.body.appendChild(el); el.focus(); el.select();
    try { document.execCommand('copy'); done(); } catch(e) { prompt('Copy for Instagram:', plain); }
    document.body.removeChild(el);
  }
  trackShare('instagram');
}

function copyToClipboard(text, btn) {
  // text may be plain or encoded — normalise it
  let plain = text;
  try { if(/%[0-9A-Fa-f]{2}/.test(text)) plain = decodeURIComponent(text); } catch(e) {}
  function showCopied(target) {
    if(!target) return;
    const orig = target.innerHTML;
    target.innerHTML = '<svg class="share-icon" viewBox="0 0 24 24" fill="#d4c49a"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><span>Copied!</span>';
    setTimeout(()=>{ target.innerHTML = orig; }, 2000);
  }
  function execFallback() {
    const el = document.createElement('textarea');
    el.value = plain;
    el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
    document.body.appendChild(el);
    el.focus(); el.select();
    try { document.execCommand('copy'); showCopied(btn); }
    catch(e) { prompt('Copy this link:', plain); }
    document.body.removeChild(el);
  }
  if(navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(plain).then(()=>showCopied(btn)).catch(execFallback);
  } else {
    execFallback();
  }
  trackShare('copy');
}

// Generate QR Code
function generateQRCode(url, elementId) {
  try {
    const el = document.getElementById(elementId);
    if (!el) return;
    el.innerHTML = '';
    new QRCode(el, {
      text: url,
      width: 120,
      height: 120,
      colorDark: '#0f0c08',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    // Fallback: show URL text if QR lib not loaded
    const el = document.getElementById(elementId);
    if (el) el.innerHTML = '<p style="font-size:10px;word-break:break-all;color:#1F4D3A;">'+url+'</p>';
  }
}

// Update progress bar
function updateProgressBar() {
  const progressContainer = document.getElementById('progressContainer');
  const progressBar = document.getElementById('progressBar');
  const ps = aP();
  
  if (step === 0) {
    progressContainer.classList.remove('visible');
    return;
  }
  
  progressContainer.classList.add('visible');
  
  // Calculate progress percentage
  let totalQuestions = 0;
  let answeredQuestions = 0;
  
  for (let i = 0; i < ps.length; i++) {
    totalQuestions += ps[i].i.length;
    for (let j = 0; j < ps[i].i.length; j++) {
      if (ANS[`${i}_${j}`]) {
        answeredQuestions++;
      }
    }
  }
  
  const progress = (answeredQuestions / totalQuestions) * 100;
  progressBar.style.width = `${progress}%`;
}

// Load saved state from localStorage
function loadState() {
  try {
    const savedState = localStorage.getItem('continuityAnalysisState');
    if (savedState) {
      const state = JSON.parse(savedState);
      // Restore answers
      if (state.answers) {
        Object.assign(ANS, state.answers);
      }
      // Restore step
      if (state.step !== undefined) {
        step = state.step;
      }
      // Restore business owner flag
      if (state.biz !== undefined) {
        biz = state.biz;
      }
      return true;
    }
  } catch (e) {
    console.log('Error loading state:', e);
  }
  return false;
}

// Save state to localStorage
function saveState() {
  try {
    const state = {
      answers: ANS,
      step: step,
      biz: biz,
      timestamp: new Date().toISOString()
    };
    localStorage.setItem('continuityAnalysisState', JSON.stringify(state));
  } catch (e) {
    console.log('Error saving state:', e);
  }
}
