<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>7‑Pillar Continuity Analysis</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#e3cf8a;
  --goldsoft:rgba(227,207,138,.18);
  --line:#2a241c;
  --bg:#0a0a08;
}

*{box-sizing:border-box;}

body{
  margin:0;
  background:var(--bg);
  color:#f4f1ea;
  font-family:'Lora',serif;
}

#wrap{
  max-width:720px;
  margin:auto;
  padding:52px 24px 100px;
}

/* STEP BAR */
.stepbar{
  display:flex;
  gap:6px;
  margin-bottom:28px;
}
.seg{
  flex:1;
  height:2px;
  background:var(--line);
}
.seg.active{
  background:var(--gold);
  box-shadow:0 0 10px var(--goldsoft);
}

/* TEXT COLORS */
.gold{color:var(--gold);}
.muted{color:#a59c8f;line-height:1.8;}

/* TOGGLE BLOCKS */
.toggle{
  border:1px solid var(--line);
  padding:16px;
  border-radius:12px;
  margin:12px 0;
}
.row{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:center;
}
.opts{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.opt{
  padding:8px 14px;
  border:1px solid var(--line);
  cursor:pointer;
  border-radius:999px;
  font-size:12px;
  letter-spacing:1px;
  transition:all .12s ease;
  user-select:none;
}
.opt:hover{transform:translateY(-1px);}
.opt:active{transform:scale(.95);}
.opt.active{
  border-color:var(--gold);
  box-shadow:0 0 12px var(--goldsoft),0 0 26px rgba(227,207,138,.10);
  color:var(--gold);
}

/* BUTTONS */
button{
  width:100%;
  padding:14px;
  background:var(--gold);
  border:none;
  font-family:Cinzel;
  letter-spacing:2px;
  margin-top:18px;
  cursor:pointer;
  transition:transform .08s ease,filter .08s ease;
}
button:active{transform:scale(0.97);filter:brightness(0.95);}
button:disabled{opacity:0.7;cursor:not-allowed;}
.alt{
  background:#1b1712;
  color:var(--gold);
  border:1px solid var(--line);
}

/* SHIELD CENTERPIECE */
.shield-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:40px 0;
}
.shield{
  position:relative;
  width:220px;
  height:auto;
}
.shield-img{
  width:100%;
  filter:drop-shadow(0 0 20px rgba(227,207,138,0.25));
}
.score-overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-family:'Cinzel',serif;
  font-size:48px;
  color:var(--gold);
  text-shadow:0 0 12px rgba(227,207,138,0.4),0 0 24px rgba(227,207,138,0.2);
}
.legend-glow .shield-img{
  animation:glowPulse 3s infinite;
}
@keyframes glowPulse{
  50%{filter:drop-shadow(0 0 40px rgba(227,207,138,0.45));}
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  background:#0a0a08;
  border:1px solid var(--line);
  color:white;
  margin-top:10px;
}
input:focus{
  outline:none;
  border-color:var(--gold);
  box-shadow:0 0 10px var(--goldsoft);
}

/* RESPONSIVE */
@media(max-width:700px){
  .row{flex-direction:column;align-items:flex-start;}
}
</style>
</head>

<body>
<div id="wrap">
  <div id="app"></div>
</div>

<script>
const P=[
{n:"Digital Life",i:["Primary Email Access","Password Manager","Cloud Storage","2FA Recovery Methods","Social Media Accounts","Digital Archive"]},
{n:"Financial & Assets",i:["Banking Accounts","Credit Accounts","Investment & Retirement Accounts","Life Insurance Policies","Cryptocurrency & Digital Assets","Recurring Bills & Subscriptions"]},
{n:"Household & Property",i:["Property Deeds & Titles","Vehicle Titles & Registration","Home Maintenance Records","Utility Accounts","Security Systems & Access Codes","Household Inventory Documentation"]},
{n:"Health & Medical",i:["Health Insurance Information","Medical Providers & Contacts","Prescription Information","Medical History & Records","Advance Healthcare Directives","Emergency Medical Instructions"]},
{n:"Legal & Estate",i:["Last Will & Testament","Trust Documentation","Financial Power of Attorney","Healthcare Power of Attorney","Beneficiary Designations","Estate Planning Documents"]},
{n:"Business Continuity",i:["Entity Formation Documents","Business Banking Access","Operating Agreements","Key Vendor Relationships","Client & Contract Records","Succession & Continuity Planning"]},
{n:"Legacy & Wishes",i:["Personal Letters","Family History & Stories","Ethical Will","Funeral Preferences","Obituary Information","Personal Wishes & Instructions"]}
];

let step=0,business=false;
const A={};

function pillars(){return business?P:P.filter(x=>x.n!=="Business Continuity");}

function calc(){
  let rec=0,na=0,total=0;
  pillars().forEach((p,pi)=>{
    total+=p.i.length;
    p.i.forEach((_,ii)=>{
      const v=A[pi+"_"+ii];
      if(v==="R")rec++;
      if(v==="N")na++;
    });
  });
  return Math.round((rec/Math.max(1,total-na))*100);
}

function tier(s){
  if(s>=86)return"CONTINUITY LEGEND";
  if(s>=71)return"STABLE CONTINUITY";
  if(s>=61)return"DEVELOPING CONTINUITY";
  return"LEGACY AT RISK";
}

function pick(k,v){
  if(A[k]===v){delete A[k];}else{A[k]=v;}
  render();
}

function submitReport(){
  const btn=document.getElementById("submitBtn");
  const firstName=document.getElementById("firstName")?.value||"";
  const email=document.getElementById("email")?.value||"";
  if(!email){
    btn.innerText="EMAIL REQUIRED";
    setTimeout(()=>{btn.innerText="REQUEST FULL ANALYSIS REPORT";},1200);
    return;
  }
  btn.disabled=true;
  btn.innerText="SENDING...";
  const score=calc();
  fetch("YOUR_ENDPOINT_HERE",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({firstName,email,score,tier:tier(score)})
  })
  .then(r=>r.json().catch(()=>({})))
  .then(()=>{btn.innerText="REPORT REQUESTED ✓";})
  .catch(err=>{
    console.error(err);
    btn.disabled=false;
    btn.innerText="TRY AGAIN";
  });
}

function render(){
  const app=document.getElementById('app');
  if(step===0){
    app.innerHTML=`
      <div class="stepbar">
        <div class="seg active"></div><div class="seg"></div><div class="seg"></div>
        <div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div>
      </div>
      <div class="gold" style="font-family:Cinzel;letter-spacing:3px">7‑PILLAR CONTINUITY ANALYSIS</div>
      <p class="muted">The 7‑Pillar Continuity Analysis evaluates how prepared your household is to maintain continuity when life changes unexpectedly.</p>
      <p class="muted">For each item, indicate whether it has been documented, organized, and can be located by the people who may need it.</p>
      <p class="muted">Do you currently own or operate a business?</p>
      <button onclick="business=true;step=1;render();">CONTINUE AS BUSINESS OWNER</button>
      <button class="alt" onclick="business=false;step=1;render();">CONTINUE AS INDIVIDUAL</button>
    `;
    return;
  }

  const ps=pillars();
  if(step<=ps.length){
    const p=ps[step-1];
    app.innerHTML=`
