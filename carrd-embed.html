<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>7-Pillar Continuity Analysis — Legacy Architect RVA</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--ink:#0b0907;--surface:rgba(16,13,9,0.97);--lift:rgba(255,255,255,0.025);--vellum:#ede8de;--sepia:#8a7d6e;--ghost:#4a4238;--bronze:#c4aa6e;--bronze-deep:#8a7448;--bronze-trace:rgba(196,170,110,0.09);--rule:rgba(196,170,110,0.14);--rule-strong:rgba(196,170,110,0.28);--danger:#9e5a4a;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{margin:0;background:#0b0907;background-image:radial-gradient(ellipse at 50% 0%,rgba(40,30,16,0.6) 0%,transparent 65%);color:var(--vellum);font-family:'Lora',serif;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden;}
#wrap{max-width:740px;margin:0 auto;padding:44px 20px 88px;}
.card{background:var(--surface);border:1px solid var(--rule);border-radius:4px;padding:32px 28px 36px;position:relative;}
.card::before{content:"";position:absolute;top:0;left:40px;right:40px;height:1px;background:linear-gradient(90deg,transparent,var(--bronze-deep),transparent);opacity:0.5;}
.stepbar{display:flex;gap:4px;margin-bottom:28px;}.seg{flex:1;height:2px;background:var(--ghost);}.seg.done{background:var(--bronze-deep);}.seg.active{background:var(--bronze);}
@keyframes veilIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes veilFade{from{opacity:0;}to{opacity:1;}}
@keyframes barRise{from{transform:scaleX(0);}to{transform:scaleX(1);}}
.appear{animation:veilIn .45s cubic-bezier(.22,1,.36,1) forwards;}
.mark{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--bronze);opacity:0.7;}
.heading{font-family:'Cinzel',serif;font-size:18px;margin:0 0 10px;color:var(--vellum);font-weight:600;}
.sub{color:var(--sepia);line-height:1.85;font-size:15px;}.rule{border:none;border-top:1px solid var(--rule);margin:22px 0;}
.toggle{border:1px solid var(--rule);padding:14px 16px;border-radius:2px;margin:8px 0;background:var(--lift);transition:border-color .2s ease;animation:veilIn .35s ease backwards;}
.toggle.aR{border-color:rgba(74,106,76,0.45);}.toggle.aU{border-color:rgba(158,90,74,0.3);}
.trow{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap;}
.tlabel{font-size:15px;color:var(--vellum);line-height:1.4;flex:1;min-width:160px;}.opts{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;}
.opt{padding:6px 14px;border:1px solid var(--ghost);cursor:pointer;border-radius:2px;font-family:'Lora',serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;transition:all .15s ease;color:var(--sepia);background:transparent;}
.opt:hover{border-color:var(--rule-strong);color:var(--vellum);}
.opt.oR{border-color:rgba(74,120,78,0.7);color:#7aaa7e;background:rgba(74,120,78,0.06);}.opt.oU{border-color:rgba(158,90,74,0.6);color:#b87a6a;background:rgba(158,90,74,0.06);}.opt.oN{border-color:rgba(196,170,110,0.45);color:#c4aa6e;background:rgba(196,170,110,0.07);}
.cpbadge{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(122,170,126,0.8);font-family:'Cinzel',serif;animation:veilFade .4s ease forwards;}
.cpdot{width:4px;height:4px;border-radius:50%;background:rgba(122,170,126,0.8);}
button{width:100%;padding:15px 18px;background:var(--bronze);border:none;font-family:'Cinzel',serif;font-weight:700;letter-spacing:3px;margin-top:20px;cursor:pointer;font-size:12px;text-transform:uppercase;color:#13100c;border-radius:2px;transition:opacity .18s ease;}
button:hover{opacity:0.88;}button.alt{background:transparent;color:var(--sepia);border:1px solid var(--rule);}
button.sm{width:auto;padding:9px 16px;font-size:11px;margin-top:10px;}.navrow{display:flex;justify-content:space-between;gap:10px;margin-top:10px;}
.ring{width:180px;height:180px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;border:1px solid var(--rule);background:#0d0b08;margin:0 auto 14px;}
.ringconic{position:absolute;inset:-42%;border-radius:50%;}.ringinner{position:relative;z-index:2;text-align:center;}
.scorenum{font-family:'Cinzel',serif;font-size:50px;color:var(--bronze);line-height:1;}.scoresub{font-size:12px;color:var(--sepia);margin-top:3px;letter-spacing:1px;}
.tierbadge{text-align:center;font-family:'Cinzel',serif;letter-spacing:3px;font-size:13px;text-transform:uppercase;margin-bottom:6px;}
.tR{color:#b07070;}.tD{color:#c09060;}.tS{color:var(--bronze);}.tL{color:#6aaa74;}
.legblock{margin-top:16px;padding:18px 20px;border:1px solid var(--rule);border-radius:2px;background:var(--lift);}.legrow{margin-bottom:12px;}.legname{font-family:'Cinzel',serif;font-size:14px;letter-spacing:1px;}.legrange{font-size:12px;opacity:.7;margin:2px 0;}.legtext{font-size:13px;color:var(--sepia);line-height:1.7;}
.bkwrap{margin-top:20px;}.bktitle{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--sepia);border-bottom:1px solid var(--rule);padding-bottom:8px;margin-bottom:14px;}
.prow{display:flex;align-items:center;gap:10px;margin-bottom:10px;animation:veilIn .4s ease backwards;}.pname{font-size:12px;color:var(--sepia);width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}.ptrack{flex:1;height:2px;background:var(--ghost);}.pfill{height:100%;background:linear-gradient(90deg,var(--bronze-deep),var(--bronze));transform-origin:left;animation:barRise .85s cubic-bezier(.22,1,.36,1) backwards;}.ppct{font-family:'Cinzel',serif;font-size:11px;color:var(--bronze);width:30px;text-align:right;flex-shrink:0;}
.gapwrap{margin-top:20px;}.gaptitle{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--sepia);border-bottom:1px solid var(--rule);padding-bottom:8px;margin-bottom:14px;}
.gapitem{display:flex;gap:14px;margin-bottom:14px;padding-left:10px;border-left:2px solid;animation:veilIn .35s ease backwards;}.gapname{font-size:14px;color:var(--vellum);margin-bottom:3px;}.gapexpl{font-size:13px;color:var(--sepia);line-height:1.65;font-style:italic;}.gappillar{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-top:4px;opacity:0.6;}
.inputfield input{width:100%;padding:12px 14px;margin-top:6px;background:rgba(8,6,4,0.9);border:1px solid var(--rule);color:var(--vellum);border-radius:2px;font-family:'Lora',serif;}
.successwrap{text-align:center;padding:28px 0;animation:veilFade .55s ease forwards;}.successmark{width:56px;height:56px;border-radius:50%;border:1px solid rgba(106,170,116,0.35);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:20px;color:rgba(106,170,116,0.9);font-family:'Cinzel',serif;}
.successhead{font-family:'Cinzel',serif;font-size:17px;color:var(--bronze);margin-bottom:10px;letter-spacing:2px;}.footnote{margin-top:18px;font-size:11px;color:var(--ghost);text-align:center;letter-spacing:1px;line-height:1.7;}
@media(max-width:640px){.pname{width:100px;}}
</style>
</head>
<body>
<div id="wrap"><div id="app" class="card"></div></div>
<script>
const WH="https://hook.us2.make.com/8sf4ost41gkncwh2tqvspqi5h29ll41b";
const PILLARS=[{n:"01: Digital Life",d:"Credentials, accounts, and digital access.",i:["Primary Email Access","Password Manager","Cloud Storage","2-Factor Authentication Recovery","Social Media Accounts","Digital Archive"]},{n:"02: Financial & Assets",d:"Banking, investments, and financial records.",i:["Banking Accounts","Credit Accounts","Investment & Retirement Accounts","Life Insurance Policies","Cryptocurrency & Digital Assets","Recurring Bills & Subscriptions"]},{n:"03: Household & Property",d:"Property, vehicles, and household documentation.",i:["Property Deeds & Titles","Vehicle Titles & Registration","Home Maintenance Records","Utility Accounts","Security Systems & Access Codes","Household Inventory Documentation"]},{n:"04: Health & Medical",d:"Insurance, records, and medical directives.",i:["Health Insurance Information","Medical Providers & Contacts","Prescription Information","Medical History & Records","Advance Healthcare Directives","Emergency Medical Instructions"]},{n:"05: Legal & Estate",d:"Wills, trusts, and legal authority.",i:["Last Will & Testament","Trust Documentation","Financial Power of Attorney","Healthcare Power of Attorney","Beneficiary Designations","Estate Planning Documents"]},{n:"06: Business Continuity",d:"Operations, agreements, and succession.",i:["Entity Formation Documents","Business Banking Access","Operating Agreements","Key Vendor Relationships","Client & Contract Records","Succession & Continuity Planning"]},{n:"07: Legacy & Wishes",d:"Personal instructions, history, and wishes.",i:["Personal Letters","Family History & Stories","Ethical Will","Funeral Preferences","Obituary Information","Personal Wishes & Instructions"]}];
const PILLAR_COLORS={"Digital Life":"#4a6880","Financial & Assets":"#8a7448","Household & Property":"#6a6050","Health & Medical":"#4a7868","Legal & Estate":"#7a4848","Business Continuity":"#8a6840","Legacy & Wishes":"#685878"};
const EXPL={"Primary Email Access":"The master key to all account recovery.","Password Manager":"Every credential lives here.","Cloud Storage":"Files and records stored here are invisible to successors.","2-Factor Authentication Recovery":"Without backup codes, two-factor barriers are absolute.","Social Media Accounts":"Active, undocumented accounts remain exposed.","Digital Archive":"A repository of personal history.","Banking Accounts":"Unrecorded accounts delay estate settlement.","Credit Accounts":"Outstanding obligations create hidden liabilities.","Investment & Retirement Accounts":"Retirement accounts must be claimed by beneficiaries.","Life Insurance Policies":"Policies go unclaimed at a striking rate.","Cryptocurrency & Digital Assets":"Undocumented wallets and keys are permanently inaccessible.","Recurring Bills & Subscriptions":"Automatic payments continue after death.","Property Deeds & Titles":"Title transfer requires the original deed.","Vehicle Titles & Registration":"Ownership cannot transfer without the title.","Home Maintenance Records":"Service history and warranties affect value.","Utility Accounts":"Access is required to pause or cancel service.","Security Systems & Access Codes":"Undocumented codes leave property unsecured.","Household Inventory Documentation":"Insurance claims and estate valuations require documentation.","Health Insurance Information":"Coverage must be documented for care.","Medical Providers & Contacts":"Care coordination requires a contact list.","Prescription Information":"Active prescriptions require documentation.","Medical History & Records":"A complete history enables informed decisions.","Advance Healthcare Directives":"An advance directive removes impossible decisions.","Emergency Medical Instructions":"Documented preferences ensure your wishes are honored.","Last Will & Testament":"Without a will, assets distribute by state law.","Trust Documentation":"Trusts must be funded and properly administered.","Financial Power of Attorney":"Manage financial affairs while incapacitated.","Healthcare Power of Attorney":"Healthcare decisions fall to the courts without it.","Beneficiary Designations":"Outdated entries pass assets contrary to wishes.","Estate Planning Documents":"Incomplete documents create disputes.","Entity Formation Documents":"Required for any transfer of ownership.","Business Banking Access":"Operations cease immediately without access.","Operating Agreements":"Leave ownership and authority ambiguous.","Key Vendor Relationships":"Contract terms cannot be honored.","Client & Contract Records":"Revenue relationships require a transition.","Succession & Continuity Planning":"Without a plan, the business may dissolve.","Personal Letters":"Messages written for specific people.","Family History & Stories":"Stories not written down are lost.","Ethical Will":"Values and lessons for future generations.","Funeral Preferences":"Family members make decisions under duress.","Obituary Information":"Biographical details are often unknown.","Personal Wishes & Instructions":"Instructions for sentimental matters."};
let step=0,biz=false,ANS={};
function aP(){return biz?PILLARS:PILLARS.filter(p=>p.n.indexOf("Business")===-1);}
function calc(){let r=0,na=0,tot=0;aP().forEach((p,pi)=>{p.i.forEach((_,ii)=>{tot++;const v=ANS[pi+"_"+ii];if(v==="R")r++;if(v==="N")na++;});});const eff=Math.max(1,tot-na);return{pct:Math.round((r/eff)*100),rec:r,eff};}
function pick(k,v){ANS[k]=v;const buttons=document.querySelectorAll(`[onclick*="${k}"]`);buttons.forEach(btn=>{btn.classList.remove('oR','oU','oN');if(btn.innerText.includes(v==='R'?'Recorded':v==='U'?'Missing':'N/A'))btn.classList.add(v==='R'?'oR':v==='U'?'oU':'oN');});const pi=k.split('_')[0],done=aP()[pi].i.every((_,ii)=>ANS[pi+"_"+ii]);const b=document.getElementById("cpbadge");if(b)b.style.display=done?"flex":"none";render();}
function submit(){const btn=document.getElementById("s7btn"),fn=document.getElementById("s7fn")?.value,em=document.getElementById("s7em")?.value;if(!em){alert("Email is required.");return;}btn.disabled=true;fetch(WH,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({firstName:fn,email:em,score:calc().pct,answers:ANS})}).then(()=>renderSuccess()).catch(()=>{btn.disabled=false;alert("Failed.");});}
function segs(t,c){return Array.from({length:t},(_,i)=>`<div class="seg ${i<c?'done':i===c?'active':''}"></div>`).join("");}
function render(){const app=document.getElementById("app");if(step===0)renderIntro(app);else if(step<=aP().length)renderQ(app);else renderResults(app);}
function renderIntro(app){app.innerHTML=`<div class="appear"><div class="stepbar">${segs(aP().length+2,0)}</div><p class="mark">7-Pillar Continuity Analysis</p><p class="heading">Legacy Architect RVA</p><p class="sub">Evaluate how prepared your household is. Do you currently own or operate a business?</p><button onclick="biz=true;step=1;render();">Continue as Business Owner</button><button class="alt" onclick="biz=false;step=1;render();">Continue as Individual</button></div>`;}
function renderQ(app){const p=aP()[step-1],pi=step-1;let h=`<div class="appear"><div class="stepbar">${segs(aP().length+2,step)}</div><p class="heading">${p.n.replace(/^\d+: /,"")}</p>`;p.i.forEach((item,idx)=>{const k=pi+"_"+idx,v=ANS[k]||"";h+=`<div class="toggle"><div class="trow"><div class="tlabel">${item}</div><div class="opts"><div class="opt ${v==='R'?'oR':''}" onclick="pick('${k}','R')">Recorded</div><div class="opt ${v==='U'?'oU':''}" onclick="pick('${k}','U')">Missing</div><div class="opt ${v==='N'?'oN':''}" onclick="pick('${k}','N')">N/A</div></div></div></div>`;});h+=`<button onclick="step++;render();">Continue</button><button class="alt sm" onclick="step--;render();">Back</button></div>`;app.innerHTML=h;}
function renderResults(app){const d=calc(),sc=d.pct;app.innerHTML=`<div class="appear"><div class="ring"><div class="scorenum">${sc}%</div></div><div class="inputrow"><div class="inputfield"><label>First Name</label><input id="s7fn"></div><div class="inputfield"><label>Email</label><input id="s7em" type="email"></div></div><button id="s7btn" onclick="submit()">Request Full Analysis</button><button class="alt sm" onclick="step--;render();">Back</button></div>`;}
function renderSuccess(){document.getElementById("app").innerHTML=`<div class="successwrap"><p class="heading">Report Requested</p><p class="sub">Your personalized analysis is on its way.</p></div>`;}
render();
</script>
</body>
</html>
