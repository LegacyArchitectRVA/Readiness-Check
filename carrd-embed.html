/* ============================================
   PERFORMANCE & ACCESSIBILITY BASE STYLES
   ============================================ */

}

/* Focus visible for keyboard navigation */

}

  font-family:'Montserrat',sans-serif;
  font-size:14px;
  font-weight:600;
}
.skip-link:focus{
  top:0;
}

/* Smooth scrolling */

/* Selection styling */
::selection{

}

/* Hide Carrd's parent logo on landing page */
body:not(.has-logo)::before,
body:not(.has-logo)::after,
.logo-container,
.site-logo,

/* ============================================
   MOBILE UX & STICKY NAVIGATION

/* Touch target improvements */

}

}
.opt{

  font-size:14px;

}
.opt:hover,

}
.opt:active{

/* Form input improvements for mobile */
.inputfield input{
  min-height:48px;

}
.inputfield input:focus{
  outline:none;

}

/* Button touch targets */
button{
  min-height:48px;
  min-width:140px;
  transition:all var(--transition-normal);
}
button:active{
  transform:scale(0.98);
}

/* Progress indicator */
.progress-container{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:4px;
  background:rgba(31, 77, 58, 0.1);
  z-index:1000;
  display:none;
}
.progress-container.visible{
  display:block;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg, var(--accent-gold-dark), var(--accent-gold), var(--accent-gold-light));
  width:0%;
  transition:width var(--transition-slow);
}

/* STEP MARKS - Elegant */
.stepbar{
  display:flex;
  gap:6px;
  margin-bottom:30px;
  height:2px;
}
.seg{
  flex:1;
  height:100%;
  background:var(--text-muted);
  border-radius:1px;
  transition:all 0.4s ease;
}
.seg.done{
  background:var(--accent-gold);
  box-shadow:0 0 8px var(--subtle-glow);
}
.seg.active{
  background:linear-gradient(90deg,var(--accent-gold),var(--accent-gold-light),var(--accent-gold));
  background-size:200% 100%;
  animation:shimmer 3s linear infinite;
  box-shadow:0 0 12px var(--subtle-glow);
}
/* ANIMATIONS - Subtle & Elegant */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes barRise{from{transform:scaleX(0);opacity:0;}to{transform:scaleX(1);opacity:1;}}
@keyframes ringGlow{0%,100%{box-shadow:0 0 10px var(--ring-glow);}50%{box-shadow:0 0 20px var(--ring-glow),0 0 30px var(--ring-glow);}}
@keyframes btnHover{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes modalFadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes modalSlideIn{from{transform:translateY(-20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* Info icon and tooltip */
.info-icon{
  width:12px;
  height:12px;
  cursor:pointer;
  margin-left:6px;
  opacity:0.6;
  transition:opacity 0.2s ease;
  flex-shrink:0;
  fill:var(--text-gold);
}
.info-icon:hover{
  opacity:1;
}
.info-tooltip{
  position:relative;
  display:inline-block;
}
.info-tooltip .tooltip-content{
  visibility:hidden;
  position:absolute;
  bottom:100%;
  left:50%;
  transform:translateX(-50%);
  background:#F4ECDC;
  border:1px solid rgba(31, 77, 58, 0.3);
  border-radius:4px;
  padding:12px 14px;

  opacity:0;
  transition:opacity 0.2s ease, visibility 0.2s ease;
  font-family:'Cormorant Garamond',serif;
}
.info-tooltip:hover .tooltip-content,
.info-tooltip:focus .tooltip-content{
  visibility:visible;
  opacity:1;
}

/* COUNTER CIRCLE - Elegant */
.counter{text-align:center;margin:16px 0 24px;}
.counter-circle{
  display:inline-block;
  padding:8px 16px;
  background:rgba(31, 77, 58, 0.05);
  border:1px solid rgba(31, 77, 58, 0.4);
  border-radius:var(--radius-sm);
  font-family:'Montserrat',sans-serif;
  font-size:14px;
  color:var(--accent-gold);
  letter-spacing:1.5px;
  box-shadow: 0 0 15px rgba(31, 77, 58, 0.3);
  font-weight:600;
  transition:all var(--transition-normal);
}
.counter-circle:hover{
  background:rgba(31, 77, 58, 0.1);
  border-color:var(--accent-gold);
}

/* Progress indicator in counter */
.counter-progress{
  font-size:11px;
  color:var(--text-secondary);
  margin-top:4px;
}

/* COMPLETE BADGE - Elegant */
.cpbadge{
  display:flex;align-items:center;gap:8px;margin-top:20px;
  font-size:13px;letter-spacing:2px;text-transform:uppercase;
  color:var(--accent-gold);
  font-family:'Montserrat',sans-serif;
  font-weight:500;
}
.cpdot{
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--accent-gold);
  box-shadow:0 0 6px var(--subtle-glow);
}
