<style>

  --accent-gold: #D4AF37;
  --accent-gold-light: #F4E4BC;
  --accent-gold-dark: #B8860B;
  --text-gold: #F4E4BC;
  --ch1: #4A90A4;
  --ch2: #8B4513;
  --ch3: #E8E8E8;
  --ch4: #2E8B57;
  --ch5: #D4AF37;
  --ch6: #696969;
  --ch7: #4B0082;
  --recorded: #2E8B57;
  --missing: #8B4513;
  --na: #696969;
  --ring-glow: rgba(212, 175, 55, 0.2);
  --subtle-glow: rgba(212, 175, 55, 0.1);
}

/* Hide Carrd's parent logo on landing page */
body:not(.has-logo)::before,
body:not(.has-logo)::after,
.logo-container,
.site-logo,
img[src*="Logos/Correct.png"]:not(.company-logo),
img[alt*="Legacy Architect"]:not(.company-logo) {
  display: none !important;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:20.24px;}
body{
  margin:0;
  background:transparent;
  color:var(--text-gold);
  font-family:'Cormorant Garamond',serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.6;
}
#wrap{
  max-width:1000px;
  margin:0 auto;
  padding:30px 20px 40px;
}
.card{
  background:transparent;
  border:1px solid rgba(212, 175, 55, 0.2);
  border-radius:0;
  padding:40px 30px 45px;
  position:relative;
  box-shadow: none;
  border-top: 1px solid rgba(212, 175, 55, 0.3);
  border-bottom: 1px solid rgba(212, 175, 55, 0.3);
}
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-gold),transparent);
  opacity:0.3;
}
.card::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-gold),transparent);
  opacity:0.3;
}
/* STEP MARKS - Elegant */
.stepbar{
  display:flex;
  gap:6px;
  margin-bottom:30px;
  height:2px;
}
.seg{
  flex:1;
  height:100%;
  background:var(--text-muted);
  border-radius:1px;
  transition:all 0.4s ease;
}
.seg.done{
  background:var(--accent-gold);
  box-shadow:0 0 8px var(--subtle-glow);
}
.seg.active{
  background:linear-gradient(90deg,var(--accent-gold),var(--accent-gold-light),var(--accent-gold));
  background-size:200% 100%;
  animation:shimmer 3s linear infinite;
  box-shadow:0 0 12px var(--subtle-glow);
}
/* ANIMATIONS - Subtle & Elegant */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes barRise{from{transform:scaleX(0);opacity:0;}to{transform:scaleX(1);opacity:1;}}
@keyframes ringGlow{0%,100%{box-shadow:0 0 10px var(--ring-glow);}50%{box-shadow:0 0 20px var(--ring-glow),0 0 30px var(--ring-glow);}}
@keyframes btnHover{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes modalFadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes modalSlideIn{from{transform:translateY(-20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

ex:10000;

}
.share-modal-visible{

}
.share-modal-header{

 .sub{line-height:1.7;}

.share-btn:hover,
.share-action-btn:hover{

.share-btn.x{

.share-btn.x:hover{

/* Info icon and tooltip */
.info-icon{
  width:16px;
  height:16px;
  cursor:pointer;
  margin-left:6px;
  opacity:0.6;
  transition:opacity 0.2s ease;
  flex-shrink:0;
}
.info-icon:hover{

  opacity:1;
}
.info-tooltip{
  position:relative;
  display:inline-block;
}
.info-tooltip .tooltip-content{
  visibility:hidden;
  position:absolute;
  bottom:100%;
  left:50%;
  transform:translateX(-50%);
  background:transparent;
  border:1px solid rgba(212, 175, 55, 0.3);
  border-radius:4px;
  padding:12px 14px;
  width:280px;
  max-width:90vw;
  font-size:13px;
  line-height:1.5;
  color:var(--text-gold);
  box-shadow:0 4px 20px rgba(0, 0, 0, 0.6);
  z-index:1000;
  opacity:0;
  transition:opacity 0.2s ease, visibility 0.2s ease;
  font-family:'Cormorant Garamond',serif;
}
.info-tooltip:hover .tooltip-content,
.info-tooltip:focus .tooltip-content{
  visibility:visible;
  opacity:1;
}
.info-tooltip .tooltip-content::before{
  content:"";
  position:absolute;
  top:100%;
  left:50%;
  transform:translateX(-50%);
