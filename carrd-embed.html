}

/* Progress indicator */
.progress-container{
  position:fixed;
  top:0;
  left:0;
  right:0;

  z-index:1000;

}
.progress-container.visible{

}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg, var(--accent-gold-dark), var(--accent-gold), var(--accent-gold-light));

/* STEP MARKS - Elegant */
.stepbar{
  display:flex;
  gap:6px;
  margin-bottom:30px;
  height:2px;
}
.seg{
  flex:1;
  height:100%;
  background:var(--text-muted);
  border-radius:1px;
  transition:all 0.4s ease;
}
.seg.done{
  background:var(--accent-gold);
  box-shadow:0 0 8px var(--subtle-glow);
}
.seg.active{
  background:linear-gradient(90deg,var(--accent-gold),var(--accent-gold-light),var(--accent-gold));
  background-size:200% 100%;
  animation:shimmer 3s linear infinite;
  box-shadow:0 0 12px var(--subtle-glow);
}
/* ANIMATIONS - Subtle & Elegant */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes barRise{from{transform:scaleX(0);opacity:0;}to{transform:scaleX(1);opacity:1;}}
@keyframes ringGlow{0%,100%{box-shadow:0 0 10px var(--ring-glow);}50%{box-shadow:0 0 20px var(--ring-glow),0 0 30px var(--ring-glow);}}
@keyframes btnHover{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes modalFadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes modalSlideIn{from{transform:translateY(-20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

// Analytics tracking
let analyticsEvents = [];

function trackEvent(eventName, data = {}) {
  analyticsEvents.push({
    timestamp: new Date().toISOString(),
    event: eventName,
    data: data,
    userAgent: navigator.userAgent,
    screenWidth: window.innerWidth,
    screenHeight: window.innerHeight
  });
  
  // Log to console for debugging
  console.log('Analytics:', eventName, data);
  
  // Send to analytics endpoint if available
  if (window.ga || window.gtag) {
    try {
      if (window.gtag) {
        gtag('event', eventName, data);
      } else if (window.ga) {
        ga('send', 'event', 'Analysis', eventName, JSON.stringify(data));
      }
    } catch (e) {
      console.log('Analytics error:', e);
    }
  }
}

      setTimeout(() => {
        target.innerHTML = originalText;

    }
  }).catch(err => {
    console.log('Copy failed:', err);
    prompt('Copy this text:', decodeURIComponent(text));

  trackShare('copy');

function generateQRCode(url, elementId) {
  try {

}

function segs(tot,cur,allDone){
  return Array.from({length:tot},(_,i)=>{
    let c="seg";
    if(allDone||i<cur)c+=" done";
    else if(i===cur)c+=" active";
    return`<div class="${c}"></div>`;
  }).join("");
}

// Update progress bar
function updateProgressBar() {
  const progressContainer = document.getElementById('progressContainer');
  const progressBar = document.getElementById('progressBar');
  const ps = aP();
  
  if (step === 0) {
    progressContainer.classList.remove('visible');
    return;
  }
  
  progressContainer.classList.add('visible');
  
  // Calculate progress percentage
  let totalQuestions = 0;
  let answeredQuestions = 0;
  
  for (let i = 0; i < ps.length; i++) {
    totalQuestions += ps[i].i.length;
    for (let j = 0; j < ps[i].i.length; j++) {
      if (ANS[`${i}_${j}`]) {
        answeredQuestions++;
      }
    }
  }
  
  const progress = (answeredQuestions / totalQuestions) * 100;
  progressBar.style.width = `${progress}%`;
}

// Load saved state from localStorage
function loadState() {
  try {
    const savedState = localStorage.getItem('continuityAnalysisState');
    if (savedState) {
      const state = JSON.parse(savedState);
      // Restore answers
      if (state.answers) {
        Object.assign(ANS, state.answers);
      }
      // Restore step
      if (state.step !== undefined) {
        step = state.step;
      }
      // Restore business owner flag
      if (state.biz !== undefined) {
        biz = state.biz;
      }
      return true;
    }
  } catch (e) {
    console.log('Error loading state:', e);
  }
  return false;
}

// Save state to localStorage
function saveState() {
  try {
    const state = {
      answers: ANS,
      step: step,
      biz: biz,
      timestamp: new Date().toISOString()
    };
    localStorage.setItem('continuityAnalysisState', JSON.stringify(state));
  } catch (e) {
    console.log('Error saving state:', e);
  }
}

// Auto-save on answer changes
// Override the pick function to save state
const originalPick = window.pick || pick;
window.pick = function(key, val) {
  originalPick(key, val);
  saveState();
};

// Load state on page load
const hasLoadedState = loadState();

// Track initial load
trackEvent('page_load', {
  hasSavedState: hasLoadedState,
  screenWidth: window.innerWidth,
  screenHeight: window.innerHeight
});

// Save state before unload
window.addEventListener('beforeunload', () => {
  saveState();
  trackEvent('page_unload');
});

// Clear state when user completes analysis
function clearState() {
  try {
    localStorage.removeItem('continuityAnalysisState');
  } catch (e) {
    console.log('Error clearing state:', e);
  }
}

// Clear state on successful submission
const originalSubmit = window.submit || submit;
window.submit = function() {
  originalSubmit();
  clearState();
};
