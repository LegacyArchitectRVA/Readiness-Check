<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta
  name="viewport"
  content="width=device-width,initial-scale=1,viewport-fit=cover"
>
<title>7-Pillar Continuity Analysis</title>

<link
  href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lora:wght@400;500;600&display=swap"
  rel="stylesheet"
>

<style>

:root{
  --gold:#e3cf8a;
  --gold-soft:rgba(227,207,138,.16);
  --line:#2a241c;
  --bg:#050405;
  --card:#0d0b09;
  --text:#f4f1ea;
  --muted:#a59c8f;
  --danger:#d06d61;

  --risk:#d45b5b;
  --develop:#e08b3a;
  --stable:#e3cf8a;
  --legend:#4bbf6b;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  font-size:16px;
}

body{
  margin:0;
  background:
    radial-gradient(circle at top,#1b1510 0,#050405 55%,#020203 100%);
  color:var(--text);
  font-family:'Lora',serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}

button,
input{
  font:inherit;
}

#wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:
    max(16px,env(safe-area-inset-top))
    14px
    max(40px,env(safe-area-inset-bottom));
}

.card{
  width:100%;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.05);
  background:
    linear-gradient(
      180deg,
      rgba(20,16,12,.92),
      rgba(8,7,5,.98)
    );
  box-shadow:
    0 0 0 1px rgba(0,0,0,.6),
    0 24px 60px rgba(0,0,0,.75);
  padding:20px;
}

.stepbar{
  display:flex;
  gap:5px;
  margin-bottom:22px;
}

.seg{
  flex:1;
  height:3px;
  border-radius:999px;
  background:#2a241c;
}

.seg.active{
  background:
    linear-gradient(
      90deg,
      rgba(227,207,138,.2),
      var(--gold)
    );
  box-shadow:0 0 12px var(--gold-soft);
}

.header-title,
.section-title,
.readiness-label{
  font-family:'Cinzel',serif;
}

.header-title{
  font-size:.88rem;
  letter-spacing:2.6px;
  text-transform:uppercase;
  color:var(--gold);
}

.section-title{
  font-size:1.25rem;
  margin:0 0 10px;
}

.readiness-label{
  font-size:1.15rem;
  letter-spacing:2px;
  text-transform:uppercase;
  text-align:center;
  margin-bottom:10px;
}

.muted{
  color:var(--muted);
  line-height:1.7;
  font-size:.97rem;
}

.toggle{
  margin:12px 0;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(12,10,8,.92);
  padding:14px;
}

.item-label{
  font-size:.98rem;
  line-height:1.5;
  margin-bottom:12px;
}

.opts{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.opt{
  min-height:46px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#0b0907;
  color:var(--muted);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px 8px;
  font-size:.72rem;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  user-select:none;
  transition:
    border-color .12s ease,
    transform .08s ease,
    color .12s ease;
}

.opt:active{
  transform:scale(.97);
}

.opt.active{
  border-color:var(--gold);
  color:var(--gold);
  box-shadow:0 0 12px var(--gold-soft);
}

button{
  width:100%;
  border:none;
  border-radius:999px;
  min-height:54px;
  padding:14px 18px;
  margin-top:18px;
  background:
    linear-gradient(
      135deg,
      #e3cf8a,
      #c1b085
    );
  color:#18140f;
  font-family:'Cinzel',serif;
  font-size:.84rem;
  font-weight:700;
  letter-spacing:1.7px;
  text-transform:uppercase;
  cursor:pointer;
}

button:active{
  transform:scale(.985);
}

button.alt{
  background:#14110d;
  color:var(--gold);
  border:1px solid var(--line);
}

.nav-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.ring-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.ring{
  width:min(48vw,190px);
  height:min(48vw,190px);
  border-radius:50%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:10px 0 14px;
  background:
    conic-gradient(
      var(--gold) var(--angle),
      rgba(255,255,255,.08) var(--angle)
    );
}

.ring::before{
  content:"";
  position:absolute;
  inset:14px;
  border-radius:50%;
  background:var(--bg);
}

.score{
  position:relative;
  z-index:2;
  font-family:'Cinzel',serif;
  font-size:clamp(2rem,9vw,3.3rem);
  color:var(--gold);
}

.tier{
  text-align:center;
  font-family:'Cinzel',serif;
  letter-spacing:1.8px;
  text-transform:uppercase;
  font-size:.85rem;
  margin-bottom:10px;
}

.tier-risk{
  color:var(--risk);
}

.tier-develop{
  color:var(--develop);
}

.tier-stable{
  color:var(--stable);
}

.tier-legend{
  color:var(--legend);
}

.legend-block{
  margin-top:18px;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(9,8,6,.92);
  padding:14px;
}

.legend-row{
  font-size:.88rem;
  line-height:1.6;
  margin-bottom:8px;
}

.input-row{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  margin-top:18px;
}

input{
  width:100%;
  min-height:52px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#070605;
  color:var(--text);
  padding:14px;
  font-size:16px;
}

input:focus{
  outline:none;
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(227,207,138,.08);
}

input::placeholder{
  color:#73695d;
}

.alert{
  margin-top:10px;
  color:var(--danger);
  font-size:.84rem;
}

.share-link{
  text-align:center;
  margin-top:14px;
  color:var(--gold);
  font-size:.88rem;
  cursor:pointer;
}

.share-link span{
  text-decoration:underline;
}

.footnote{
  margin-top:18px;
  text-align:center;
  color:#7f7567;
  font-size:.72rem;
  line-height:1.6;
}

@media (min-width:640px){

  .card{
    padding:28px;
  }

  .input-row{
    grid-template-columns:1fr 1fr;
  }

  .toggle{
    padding:16px;
  }

}

</style>
</head>

<body>

<div id="wrap">
  <div id="app"></div>
</div>

<script>

const WEBHOOK_URL =
  "https://hook.us2.make.com/8sf4ost41gkncwh2tqvspqi5h29ll41b";

const PILLARS = [

  {
    n:"01: Digital Life",
    i:[
      "Primary Email Access",
      "Password Manager",
      "Cloud Storage",
      "2FA Recovery",
      "Social Media Accounts",
      "Digital Archive"
    ]
  },

  {
    n:"02: Financial & Assets",
    i:[
      "Banking Accounts",
      "Credit Accounts",
      "Investments & Retirement",
      "Life Insurance",
      "Crypto & Digital Assets",
      "Recurring Bills"
    ]
  },

  {
    n:"03: Household & Property",
    i:[
      "Property Deeds",
      "Vehicle Titles",
      "Maintenance Records",
      "Utility Accounts",
      "Security Access",
      "Household Inventory"
    ]
  },

  {
    n:"04: Health & Medical",
    i:[
      "Health Insurance",
      "Medical Contacts",
      "Prescriptions",
      "Medical History",
      "Healthcare Directives",
      "Emergency Instructions"
    ]
  },

  {
    n:"05: Legal & Estate",
    i:[
      "Will & Testament",
      "Trust Documentation",
      "Financial POA",
      "Healthcare POA",
      "Beneficiaries",
      "Estate Documents"
    ]
  },

  {
    n:"06: Business Continuity",
    i:[
      "Formation Documents",
      "Business Banking",
      "Operating Agreements",
      "Vendor Relationships",
      "Client Records",
      "Succession Planning"
    ]
  },

  {
    n:"07: Legacy & Wishes",
    i:[
      "Personal Letters",
      "Family Stories",
      "Ethical Will",
      "Funeral Preferences",
      "Obituary Information",
      "Personal Wishes"
    ]
  }

];

let step = 0;
let businessOwner = false;

const ANSWERS = {};

function activePillars(){

  return businessOwner
    ? PILLARS
    : PILLARS.filter(
        p => !p.n.includes("Business Continuity")
      );
}

function calcScore(){

  let recorded = 0;
  let na = 0;
  let total = 0;

  activePillars().forEach((pillar,pi)=>{

    pillar.i.forEach((item,ii)=>{

      total++;

      const val =
        ANSWERS[pi + "_" + ii];

      if(val === "R"){
        recorded++;
      }

      if(val === "N"){
        na++;
      }

    });

  });

  const effective =
    Math.max(1,total - na);

  return {
    recorded,
    effective,
    percent:Math.round(
      (recorded / effective) * 100
    )
  };
}

function tier(score){

  if(score >= 86){
    return {
      label:"Continuity Luminary",
      class:"tier-legend"
    };
  }

  if(score >= 71){
    return {
      label:"Continuity Steward",
      class:"tier-stable"
    };
  }

  if(score >= 61){
    return {
      label:"Continuity Builder",
      class:"tier-develop"
    };
  }

  return {
    label:"Continuity Sentinel",
    class:"tier-risk"
  };
}

function pick(key,val){

  if(ANSWERS[key] === val){

    delete ANSWERS[key];

  }else{

    ANSWERS[key] = val;

  }

  render();
}

function next(){

  step++;

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

  render();
}

function back(){

  if(step > 0){

    step--;

    render();
  }
}

function resetAll(){

  Object.keys(ANSWERS).forEach(key=>{

    delete ANSWERS[key];

  });

  businessOwner = false;
  step = 0;

  render();
}

function share(){

  const s = calcScore();

  const text =
    "My Continuity Readiness score is " +
    s.percent +
    "%.";

  if(navigator.share){

    navigator.share({
      title:"7-Pillar Continuity Analysis",
      text:text,
      url:location.href
    });

  }else{

    navigator.clipboard.writeText(
      text + " " + location.href
    );

    alert("Copied.");
  }
}

function submitReport(){

  const btn =
    document.getElementById("submitBtn");

  const alert =
    document.getElementById("submitAlert");

  const firstName =
    document
      .getElementById("firstName")
      .value
      .trim();

  const email =
    document
      .getElementById("email")
      .value
      .trim();

  alert.innerHTML = "";

  if(!email){

    alert.innerHTML =
      "Email is required.";

    return;
  }

  btn.disabled = true;
  btn.innerHTML = "SENDING...";

  const scoreData = calcScore();

  const strengths = [];
  const gaps = [];
  const pillarBreakdown = [];

  activePillars().forEach((pillar,pi)=>{

    let recorded = 0;
    let unprepared = 0;
    let na = 0;

    pillar.i.forEach((item,ii)=>{

      const val =
        ANSWERS[pi + "_" + ii];

      if(val === "R"){

        recorded++;

        strengths.push({
          pillar:pillar.n,
          item:item
        });
      }

      if(val === "U"){

        unprepared++;

        gaps.push({
          pillar:pillar.n,
          item:item
        });
      }

      if(val === "N"){
        na++;
      }

    });

    const effective =
      pillar.i.length - na;

    pillarBreakdown.push({

      pillar:pillar.n,

      recorded:recorded,

      unprepared:unprepared,

      na:na,

      percent:
        effective > 0
          ? Math.round(
              (recorded / effective) * 100
            )
          : 0

    });

  });

  const payload = {

    submittedAt:
      new Date().toISOString(),

    firstName:firstName,

    email:email,

    businessOwner:
      businessOwner ? "Yes" : "No",

    score:
      scoreData.percent,

    recordedItems:
      scoreData.recorded,

    applicableItems:
      scoreData.effective,

    tier:
      tier(scoreData.percent).label,

    strengths:
      strengths,

    gaps:
      gaps,

    pillarBreakdown:
      pillarBreakdown,

    answers:
      ANSWERS

  };

  fetch(WEBHOOK_URL,{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify(payload)

  })
  .then(()=>{

    btn.innerHTML =
      "REPORT REQUESTED";

  })
  .catch(error=>{

    console.error(error);

    btn.disabled = false;

    btn.innerHTML =
      "TRY AGAIN";

    alert.innerHTML =
      "Unable to send request.";

  });
}

function render(){

  const app =
    document.getElementById("app");

  app.className = "card";

  if(step === 0){

    renderIntro(app);

  }else if(
    step <= activePillars().length
  ){

    renderQuestions(app);

  }else{

    renderResults(app);

  }
}

function renderIntro(app){

  const total =
    activePillars().length + 2;

  app.innerHTML = `

    <div class="stepbar">

      ${
        Array.from(
          {length:total},
          (_,i)=>`
            <div class="seg ${i===0 ? "active" : ""}"></div>
          `
        ).join("")
      }

    </div>

    <div class="header-title">
      7-PILLAR CONTINUITY ANALYSIS
    </div>

    <p class="muted" style="margin-top:12px;">
      Evaluate how prepared your household is to maintain continuity when life changes unexpectedly.
    </p>

    <p class="muted" style="margin-top:18px;">
      Do you currently own or operate a business?
    </p>

    <button id="businessBtn">
      Continue as Business Owner
    </button>

    <button
      class="alt"
      id="individualBtn"
    >
      Continue as Individual
    </button>

  `;

  document
    .getElementById("businessBtn")
    .onclick = ()=>{

      businessOwner = true;
      step = 1;
      render();
    };

  document
    .getElementById("individualBtn")
    .onclick = ()=>{

      businessOwner = false;
      step = 1;
      render();
    };
}

function renderQuestions(app){

  const pillars =
    activePillars();

  const pillar =
    pillars[step - 1];

  const total =
    pillars.length + 2;

  let html = `

    <div class="stepbar">

      ${
        Array.from(
          {length:total},
          (_,i)=>`
            <div class="seg ${i <= step ? "active" : ""}"></div>
          `
        ).join("")
      }

    </div>

    <div class="section-title">
      ${pillar.n}
    </div>

  `;

  pillar.i.forEach((item,idx)=>{

    const key =
      (step - 1) + "_" + idx;

    const val =
      ANSWERS[key] || "";

    html += `

      <div class="toggle">

        <div class="item-label">
          ${item}
        </div>

        <div class="opts">

          <div
            class="opt ${val==="R" ? "active" : ""}"
            onclick="pick('${key}','R')"
          >
            Recorded
          </div>

          <div
            class="opt ${val==="U" ? "active" : ""}"
            onclick="pick('${key}','U')"
          >
            Missing
          </div>

          <div
            class="opt ${val==="N" ? "active" : ""}"
            onclick="pick('${key}','N')"
          >
            N/A
          </div>

        </div>

      </div>

    `;
  });

  html += `

    <button id="continueBtn">
      Continue
    </button>

    <div class="nav-row">

      <button
        class="alt"
        id="backBtn"
      >
        Back
      </button>

      <button
        class="alt"
        id="resetBtn"
      >
        Reset
      </button>

    </div>

  `;

  app.innerHTML = html;

  document
    .getElementById("continueBtn")
    .onclick = next;

  document
    .getElementById("backBtn")
    .onclick = back;

  document
    .getElementById("resetBtn")
    .onclick = resetAll;
}

function renderResults(app){

  const s = calcScore();

  const t =
    tier(s.percent);

  const angle =
    Math.round(
      (s.percent / 100) * 360
    );

  app.innerHTML = `

    <div class="ring-wrap">

      <div class="readiness-label">
        Continuity Readiness
      </div>

      <div
        class="ring"
        style="--angle:${angle}deg"
      >

        <div class="score">
          ${s.percent}%
        </div>

      </div>

    </div>

    <div class="tier ${t.class}">
      ${t.label}
    </div>

    <p
      class="muted"
      style="text-align:center;"
    >
      ${s.recorded}
      of
      ${s.effective}
      applicable items recorded.
    </p>

    <div class="legend-block">

      <div class="legend-row">
        <span class="tier-legend">
          Luminary
        </span>
        — 86–100%
      </div>

      <div class="legend-row">
        <span class="tier-stable">
          Steward
        </span>
        — 71–85%
      </div>

      <div class="legend-row">
        <span class="tier-develop">
          Builder
        </span>
        — 61–70%
      </div>

      <div class="legend-row">
        <span class="tier-risk">
          Sentinel
        </span>
        — Below 61%
      </div>

    </div>

    <div class="input-row">

      <input
        type="text"
        id="firstName"
        placeholder="First Name (Optional)"
      >

      <input
        type="email"
        id="email"
        placeholder="Email*"
      >

    </div>

    <div
      id="submitAlert"
      class="alert"
    ></div>

    <button id="submitBtn">
      Request Full Analysis Report
    </button>

    <div
      class="share-link"
      id="shareBtn"
    >
      <span>Share your score</span>
    </div>

    <div class="nav-row">

      <button
        class="alt"
        id="backBtn"
      >
        Back
      </button>

      <button
        class="alt"
        id="resetBtn"
      >
        Reset
      </button>

    </div>

    <div class="footnote">
      Informational purposes only. Not legal or financial advice.
    </div>

  `;

  document
    .getElementById("submitBtn")
    .onclick = submitReport;

  document
    .getElementById("shareBtn")
    .onclick = share;

  document
    .getElementById("backBtn")
    .onclick = back;

  document
    .getElementById("resetBtn")
    .onclick = resetAll;
}

document.addEventListener(
  "DOMContentLoaded",
  render
);

</script>

</body>
</html>
