let step=0,biz=false,isBack=false;
const ANS={};
function aP(){return PILLARS;}
function calc(){
  let r=0,na=0,tot=0;
  aP().forEach((p,pi)=>{p.i.forEach((_,ii)=>{tot++;const v=ANS[pi+"_"+ii];if(v==="R")r++;if(v==="N")na++;});});
  const eff=Math.max(1,tot-na);
  return{pct:Math.round((r/eff)*100),rec:r,eff,tot};
}
function bkdown(){
  return aP().map((p,pi)=>{
    let r=0,u=0,na=0;
    p.i.forEach((_,ii)=>{const v=ANS[pi+"_"+ii];if(v==="R")r++;else if(v==="U")u++;else if(v==="N")na++;});
    const e=p.i.length-na;
    return{nm:p.n.replace(/^\d+: /,""),r,u,na,pct:e>0?Math.round((r/e)*100):0};
  });
}
function getGaps(){
  const g=[];
  aP().forEach((p,pi)=>{
    p.i.forEach((item,ii)=>{
      if(ANS[pi+"_"+ii]==="U")g.push({pl:p.n.replace(/^\d+: /,""),item});
    });
  });
  return g;
}
function getStr(){
  const s=[];
  aP().forEach((p,pi)=>{p.i.forEach((item,ii)=>{if(ANS[pi+"_"+ii]==="R")s.push({pl:p.n.replace(/^\d+: /,""),item});});});

}
function tLabel(s){if(s>=86)return"Continuity Legend";if(s>=71)return"Continuity Steward";if(s>=61)return"Continuity Builder";return"Continuity Sentinel";}

function rec(s){
  if(s<61)return"Begin by centralizing your most critical digital and financial credentials into a single, secure location.";
  if(s<71)return"A foundation exists. Prioritize Legal & Estate documentation and close your single points of failure.";
  if(s<86)return"Strong positioning. Focus on completeness in your remaining gaps and an annual review cadence.";

}
// Convert number to Roman numeral (1-6)
function toRoman(num) {
  const romanNumerals = ['I', 'II', 'III', 'IV', 'V', 'VI'];
  return romanNumerals[num - 1] || '';
}

function pick(key,val){
  const previousValue = ANS[key];
  if(ANS[key]===val){delete ANS[key];}else{ANS[key]=val;}
  const pi=step-1;const ps=aP();
  const done=ps[pi].i.every((_,ii)=>ANS[pi+"_"+ii]);
  render();
  if(done){
    const b=document.getElementById("cpbadge");
    if(b)b.style.display="flex";
  }
  
  // Track answer selection
  trackEvent('answer', {
    pillar: pi + 1,
    item: key,
    value: val || 'none',
    previousValue: previousValue || 'none'
  });
}
function goN(){
  const currentStep = step;
  // Check if all questions in current pillar are answered
  const pi=step-1;
  const ps=aP();
  if(pi >= 0 && pi < ps.length){
    const currentPillar = ps[pi];
    const allAnswered = currentPillar.i.every((_,ii)=>ANS[pi+"_"+ii]);
    if(!allAnswered){
      // Find first unanswered question in this pillar
      const firstUnanswered = currentPillar.i.findIndex((_,ii)=>!ANS[pi+"_"+ii]);
      if(firstUnanswered !== -1){
        // Mark unanswered questions and stay on page
        render();
        // Add unanswered class to unanswered toggles
        setTimeout(() => {
          const unansweredToggles = document.querySelectorAll('.toggle:not(.aR):not(.aU):not(.aN)');
          unansweredToggles.forEach(el => el.classList.add('unanswered'));
        }, 50);
        // Scroll to first unanswered
        setTimeout(()=>{
          const unansweredElements = document.querySelectorAll('.toggle.unanswered');
          if(unansweredElements.length > 0){
            unansweredElements[0].scrollIntoView({behavior:'smooth', block:'center'});
          }
        }, 100);
        return;
      }
    }
  }
  step++;isBack=false;render();
  trackNavigation('next', currentStep, step);
  setTimeout(() => {
    window.scrollTo({top: 0, behavior: 'smooth'});
  }, 10);
}
function goB(){if(step>0){const currentStep = step;step--;isBack=true;render();trackNavigation('back', currentStep, step);setTimeout(() => {
    window.scrollTo({top: 0, behavior: 'smooth'});
  }, 10);}}
function reset(){for(const k in ANS)delete ANS[k];step=0;biz=false;isBack=false;render();trackEvent('reset');}
function animNum(el,tgt){
  let st=null;
  function f(ts){if(!st)st=ts;const p=Math.min((ts-st)/1400,1);const e=1-Math.pow(1-p,3);el.textContent=Math.round(e*tgt)+"%";if(p<1)requestAnimationFrame(f);}
  requestAnimationFrame(f);
}
function animRing(el,tgt,color="var(--btn-color)"){
  let st=null;
  function f(ts){
    if(!st)st=ts;const p=Math.min((ts-st)/1500,1);const e=1-Math.pow(1-p,3);
    const a=Math.round(e*tgt*3.6);
    // Convert CSS variable to RGB for conic gradient
    const colorMap = {
      "var(--ch1)": "rgba(96, 165, 250, 0.9)",
      "var(--ch2)": "rgba(248, 113, 113, 0.9)",
      "var(--ch3)": "rgba(226, 232, 240, 0.9)",
      "var(--ch4)": "rgba(52, 211, 153, 0.9)",
      "var(--ch5)": "rgba(31, 77, 58, 0.9)",
      "var(--ch6)": "rgba(148, 163, 184, 0.9)",
      "var(--ch7)": "rgba(192, 132, 252, 0.9)",
      "var(--btn-color)": "rgba(198, 168, 90, 0.9)"
    };
    const baseColor = colorMap[color] || "rgba(198, 168, 90, 0.9)";
    const darkColor = baseColor.replace("0.9", "0.7");
    const darkerColor = baseColor.replace("0.9", "0.5");
    const darkestColor = baseColor.replace("0.9", "0.3");
    el.style.background=`conic-gradient(${darkestColor} 0deg,${baseColor} ${a}deg,${darkerColor} ${a}deg,${darkestColor} 360deg)`;
    if(p<1)requestAnimationFrame(f);
  }
  requestAnimationFrame(f);
}
function markAllAsNAAndScroll(){

      btn.scrollIntoView({behavior:'smooth', block:'center'});
      // Add visual highlight
      btn.style.boxShadow = '0 0 20px rgba(31, 77, 58, 0.6)';
      setTimeout(() => {
        btn.style.boxShadow = '0 2px 10px rgba(0, 0, 0, 0.2)';
      }, 1000);
    }
  }, 500);
}

// Focus next toggle after selecting an answer
function focusNextToggle(currentKey, currentIndex, totalItems) {
  setTimeout(() => {
    if (currentIndex < totalItems) {
      const nextKey = currentKey.split('_')[0] + '_' + (currentIndex + 1);
      const nextToggle = document.getElementById('toggle-' + nextKey);
      if (nextToggle) {
        nextToggle.scrollIntoView({behavior: 'smooth', block: 'center'});
        // Add visual focus
        nextToggle.style.boxShadow = '0 0 0 2px rgba(31, 77, 58, 0.5)';
        setTimeout(() => {
          nextToggle.style.boxShadow = '';
        }, 1000);
      }
    }
  }, 100);
}

function markAllAsNA(){
  const pi=step-1;
  const ps=aP();
  if(pi >= 0 && pi < ps.length){
    ps[pi].i.forEach((_,ii)=>{
      ANS[pi+"_"+ii]="N";
    });
    render();
    // Force show the badge
    setTimeout(() => {
      const b=document.getElementById("cpbadge");
      if(b)b.style.display="flex";
    }, 50);
  }
}

let analyticsEvents = [];

  analyticsEvents.push({
    timestamp: new Date().toISOString(),
    event: eventName,
    data: data,
    userAgent: navigator.userAgent,
    screenWidth: window.innerWidth,
    screenHeight: window.innerHeight
  });
  
  // Log to console for debugging
  console.log('Analytics:', eventName, data);
  
  // Send to analytics endpoint if available
  if (window.ga || window.gtag) {
    try {
      if (window.gtag) {
        gtag('event', eventName, data);
      } else if (window.ga) {
        ga('send', 'event', 'Analysis', eventName, JSON.stringify(data));

// Update progress bar
function updateProgressBar() {
  const progressContainer = document.getElementById('progressContainer');
  const progressBar = document.getElementById('progressBar');
  const ps = aP();
  
  if (step === 0) {
    progressContainer.classList.remove('visible');
    return;
  }
  
  progressContainer.classList.add('visible');
  
  // Calculate progress percentage
  let totalQuestions = 0;
  let answeredQuestions = 0;
  
  for (let i = 0; i < ps.length; i++) {
    totalQuestions += ps[i].i.length;
    for (let j = 0; j < ps[i].i.length; j++) {
      if (ANS[`${i}_${j}`]) {
        answeredQuestions++;
      }
    }
  }
  
  const progress = (answeredQuestions / totalQuestions) * 100;
  progressBar.style.width = `${progress}%`;
}

    const state = {
      answers: ANS,
      step: step,
      biz: biz,
      timestamp: new Date().toISOString()
    };
    localStorage.setItem('continuityAnalysisState', JSON.stringify(state));
  } catch (e) {
    console.log('Error saving state:', e);
  }
}

// Auto-save on answer changes
// Override the pick function to save state
const originalPick = window.pick || pick;
window.pick = function(key, val) {
  originalPick(key, val);
  saveState();
};

// Load state on page load
const hasLoadedState = loadState();

// Track initial load
trackEvent('page_load', {
  hasSavedState: hasLoadedState,
  screenWidth: window.innerWidth,
  screenHeight: window.innerHeight
});

// Save state before unload
window.addEventListener('beforeunload', () => {
  saveState();
  trackEvent('page_unload');
});

// Clear state when user completes analysis
function clearState() {
  try {
    localStorage.removeItem('continuityAnalysisState');
  } catch (e) {
    console.log('Error clearing state:', e);
  }
}

// Clear state on successful submission
const originalSubmit = window.submit || submit;
window.submit = function() {
  originalSubmit();
  clearState();
};

// ============================================
// INITIALIZE
// ============================================
render();
</script>
