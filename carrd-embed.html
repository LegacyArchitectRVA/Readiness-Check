<script>
// --- Updated pick() to prevent flickering ---
function pick(key, val) {
  ANS[key] = val; 
  
  // Update UI locally without calling render()
  const el = document.querySelector(`[onclick="pick('${key}','${val}')"]`);
  if (!el) return;
  const container = el.closest('.toggle');
  container.className = `toggle a${val}`;
  
  // Highlight chosen option
  container.querySelectorAll('.opt').forEach(o => o.classList.remove('oR', 'oU', 'oN'));
  el.classList.add(val === 'R' ? 'oR' : val === 'U' ? 'oU' : 'oN');

  // Update badge visibility
  const pi = key.split('_')[0];
  const p = aP()[pi];
  const done = p.i.every((_,ii) => ANS[pi + "_" + ii]);
  const badge = document.getElementById("cpbadge");
  if(badge) badge.style.display = done ? "flex" : "none";
}

// --- Updated submit() for reliable POST to Make.com ---
function submit() {
  const btn = document.getElementById("s7btn");
  const ae = document.getElementById("s7al");
  const fn = (document.getElementById("s7fn") || {}).value?.trim() || "";
  const em = (document.getElementById("s7em") || {}).value?.trim() || "";

  if(ae) ae.textContent = "";
  if(!em) { if(ae) ae.textContent = "An email address is required."; return; }

  btn.disabled = true;
  btn.innerText = "Sending...";

  const form = document.createElement("form");
  form.method = "POST";
  form.action = "https://hook.us2.make.com/8sf4ost41gkncwh2tqvspqi5h29ll41b";

  const payload = {
    firstName: fn,
    email: em,
    score: calc().pct,
    answers: JSON.stringify(ANS)
  };

  for (const key in payload) {
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = key;
    input.value = payload[key];
    form.appendChild(input);
  }

  document.body.appendChild(form);
  form.submit();
  renderSuccess();
}

window.pick=pick; window.goN=goN; window.goB=goB; window.reset=reset; window.submit=submit; window.shareScore=shareScore;

</script>
