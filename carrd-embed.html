function closeShareModal() {

  if (modal) {
    modal.querySelector('.share-modal').classList.remove('share-modal-visible');
    setTimeout(() => modal.remove(), 300);
  }

function trackShare(platform) {
  console.log('Shared to:', platform);
}

function shareViaEmail(text, url) {
  const subject = encodeURIComponent('My Continuity Readiness Score');
  const body = encodeURIComponent(text + '\n\n' + url);
  window.open(`mailto:?subject=${subject}&body=${body}`, '_blank');
  trackShare('email');
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(decodeURIComponent(text)).then(() => {
    const btn = event.currentTarget;
    const originalText = btn.innerHTML;
    btn.innerHTML = '<svg class="share-icon" viewBox="0 0 24 24" fill="#000000"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><span>Copied!</span>';
    setTimeout(() => {
      btn.innerHTML = originalText;
    }, 2000);
  }).catch(err => {
    console.log('Copy failed:', err);
    prompt('Copy this text:', decodeURIComponent(text));
  });
  trackShare('copy');
}

function submit(){

  if(ae)ae.textContent="";
  if(!em){if(ae)ae.textContent="An email address is required to receive your report.";return;}
  btn.disabled=true;
  btn.innerHTML='<span class="ldots"><span></span><span></span><span></span></span>';
  const d=calc();const sc=d.pct;const tl=tLabel(sc);
  const gaps=getGaps();const str=getStr();const bk=bkdown();
  const payload={firstName:fn,email:em,score:sc,maxScore:d.eff,recordedItems:d.rec,percent:sc,tier:tl,businessOwner:biz?"Yes":"No",answers:ANS,recommendation:rec(sc),pillarSummary:aP().map(p=>p.n).join(", "),strengths:str,gaps,pillarBreakdown:bk};
  fetch(WH,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})

function segs(tot,cur,allDone){
  return Array.from({length:tot},(_,i)=>{
    let c="seg";
    if(allDone||i<cur)c+=" done";
    else if(i===cur)c+=" active";
    return`<div class="${c}"></div>`;
  }).join("");
}
function render(){
  const app=document.getElementById("app");
  const ps=aP();
  if(step===0){renderIntro(app,ps);}
  else if(step<=ps.length){renderQ(app,ps);}
  else{
    // Check if all questions are answered before showing results
    const allAnswered = ps.every((p,pi)=>p.i.every((_,ii)=>ANS[pi+"_"+ii]));
    if(!allAnswered){
      // Find first pillar with unanswered questions
      const firstUnfinishedPillar = ps.findIndex((p,pi)=>!p.i.every((_,ii)=>ANS[pi+"_"+ii]));
      if(firstUnfinishedPillar !== -1){
        step = firstUnfinishedPillar + 1;
        isBack = false;
        renderQ(app, ps);
        // Add visual marker to unanswered questions
        setTimeout(()=>{
          const unansweredToggles = document.querySelectorAll('.toggle:not(.aR):not(.aU):not(.aN)');
          unansweredToggles.forEach(el => {
            el.style.borderLeft = '3px solid #B22222';
            el.style.backgroundColor = 'rgba(178, 34, 34, 0.05)';
          });
          if(unansweredToggles.length > 0){
            unansweredToggles[0].scrollIntoView({behavior:'smooth', block:'center'});
          }
        }, 100);
        return;
      }
    }
    renderResults(app,ps);
  }
}
