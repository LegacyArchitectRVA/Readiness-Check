<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>7-Pillar Continuity Analysis</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
  --gold:#e3cf8a;
  --gold-soft:rgba(227,207,138,0.18);
  --line:#2a241c;
  --bg:#050405;
  --text:#f4f1ea;
  --muted:#a59c8f;
  --danger:#c96b5b;
  --accent:#c1b085;

  --tier-risk:#d45b5b;
  --tier-develop:#e08b3a;
  --tier-stable:#e3cf8a;
  --tier-legend:#4bbf6b;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:
    radial-gradient(circle at top,#1b1510 0,#050405 55%,#020203 100%);
  color:var(--text);
  font-family:'Lora',serif;
  -webkit-font-smoothing:antialiased;
  font-size:17px;
}

#wrap{
  max-width:760px;
  margin:0 auto;
  padding:40px 18px 80px;
}

.card{
  background:transparent;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.7),
    0 26px 60px rgba(0,0,0,0.85);
  padding:26px 22px 30px;
}

.header-title{
  font-family:'Cinzel',serif;
  letter-spacing:3px;
  font-size:15px;
  text-transform:uppercase;
  color:var(--gold);
}

.header-sub{
  margin-top:10px;
  color:var(--muted);
  line-height:1.8;
  font-size:16px;
}

.stepbar{
  display:flex;
  gap:6px;
  margin-bottom:22px;
  margin-top:4px;
}

.seg{
  flex:1;
  height:3px;
  border-radius:999px;
  background:var(--line);
}

.seg.active{
  background:
    linear-gradient(
      90deg,
      rgba(227,207,138,0.1),
      var(--gold)
    );
  box-shadow:0 0 14px var(--gold-soft);
}

.section-title{
  font-family:'Cinzel',serif;
  font-size:21px;
  margin:0 0 10px;
}

.muted{
  color:var(--muted);
  line-height:1.8;
}

.toggle{
  border:1px solid var(--line);
  padding:14px;
  border-radius:12px;
  margin:10px 0;
  background:rgba(10,10,8,0.9);
}

.row{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
}

.item-label{
  font-size:16px;
}

.opts{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.opt{
  padding:7px 13px;
  border:1px solid var(--line);
  cursor:pointer;
  border-radius:999px;
  font-size:13px;
  letter-spacing:1px;
  text-transform:uppercase;
  transition:all .12s ease;
  user-select:none;
  color:var(--muted);
  background:rgba(8,8,6,0.9);
}

.opt.active{
  border-color:var(--gold);
  box-shadow:0 0 12px var(--gold-soft);
  color:var(--gold);
}

button{
  width:100%;
  padding:16px;
  background:
    linear-gradient(
      135deg,
      #e3cf8a,
      #c1b085
    );
  border:none;
  font-family:'Cinzel',serif;
  font-weight:700;
  letter-spacing:2px;
  margin-top:18px;
  cursor:pointer;
  font-size:14px;
  text-transform:uppercase;
  color:#1b1712;
  border-radius:999px;
}

button.alt{
  background:#1b1712;
  color:var(--gold);
  border:1px solid var(--line);
}

button.small{
  width:auto;
  padding:10px 18px;
  font-size:13px;
}

.nav-row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:10px;
}

.ring-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:10px 0 18px;
}

.readiness-label{
  font-family:'Cinzel',serif;
  font-size:22px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#ffffff;
  margin-bottom:8px;
}

.ring{
  width:190px;
  height:190px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:10px auto 14px;
  border:1px solid var(--line);
  position:relative;
  background:
    conic-gradient(
      var(--gold) var(--angle),
      rgba(255,255,255,0.08) var(--angle)
    );
}

.ring::before{
  content:"";
  position:absolute;
  inset:16px;
  border-radius:50%;
  background:#050405;
}

.score{
  position:relative;
  z-index:2;
  font-family:'Cinzel',serif;
  font-size:52px;
  color:var(--gold);
}

.input-row{
  display:flex;
  gap:10px;
  margin-top:18px;
  flex-wrap:wrap;
}

.input-field{
  flex:1;
}

input{
  width:100%;
  padding:13px 12px;
  background:#050405;
  border:1px solid var(--line);
  color:var(--text);
  margin-top:6px;
  border-radius:10px;
  font-size:16px;
}

input::placeholder{
  color:#6f675c;
}

.legend-block{
  margin-top:16px;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--line);
  background:rgba(8,7,5,0.95);
  font-size:14px;
  color:var(--muted);
  line-height:1.7;
}

.legend-row{
  margin-bottom:10px;
}

.tier-risk{
  color:var(--tier-risk);
}

.tier-develop{
  color:var(--tier-develop);
}

.tier-stable{
  color:var(--tier-stable);
}

.tier-legend{
  color:var(--tier-legend);
}

.alert{
  margin-top:10px;
  font-size:13px;
  color:var(--danger);
}

.share-link{
  margin-top:10px;
  font-size:13px;
  text-align:center;
  color:var(--accent);
  cursor:pointer;
}

.share-link span{
  text-decoration:underline;
}

.footnote{
  margin-top:16px;
  font-size:12px;
  color:#7f7567;
  text-align:center;
}

@media(max-width:700px){

  #wrap{
    padding:26px 14px 60px;
  }

  .card{
    padding:20px 16px 24px;
  }

  .row{
    flex-direction:column;
    align-items:flex-start;
  }

  .input-row{
    flex-direction:column;
  }

}

</style>
</head>

<body>

<div id="wrap">
  <div id="app"></div>
</div>

<script type="text/javascript">

const WEBHOOK_URL =
  "https://hook.us2.make.com/8sf4ost41gkncwh2tqvspqi5h29ll41b";

const PILLARS = [

  {
    n:"01: Digital Life",
    i:[
      "Primary Email Access",
      "Password Manager",
      "Cloud Storage",
      "2-Factor Authentication Recovery",
      "Social Media Accounts",
      "Digital Archive"
    ]
  },

  {
    n:"02: Financial & Assets",
    i:[
      "Banking Accounts",
      "Credit Accounts",
      "Investment & Retirement Accounts",
      "Life Insurance Policies",
      "Cryptocurrency & Digital Assets",
      "Recurring Bills & Subscriptions"
    ]
  },

  {
    n:"03: Household & Property",
    i:[
      "Property Deeds & Titles",
      "Vehicle Titles & Registration",
      "Home Maintenance Records",
      "Utility Accounts",
      "Security Systems & Access Codes",
      "Household Inventory Documentation"
    ]
  },

  {
    n:"04: Health & Medical",
    i:[
      "Health Insurance Information",
      "Medical Providers & Contacts",
      "Prescription Information",
      "Medical History & Records",
      "Advance Healthcare Directives",
      "Emergency Medical Instructions"
    ]
  },

  {
    n:"05: Legal & Estate",
    i:[
      "Last Will & Testament",
      "Trust Documentation",
      "Financial Power of Attorney",
      "Healthcare Power of Attorney",
      "Beneficiary Designations",
      "Estate Planning Documents"
    ]
  },

  {
    n:"06: Business Continuity",
    i:[
      "Entity Formation Documents",
      "Business Banking Access",
      "Operating Agreements",
      "Key Vendor Relationships",
      "Client & Contract Records",
      "Succession & Continuity Planning"
    ]
  },

  {
    n:"07: Legacy & Wishes",
    i:[
      "Personal Letters",
      "Family History & Stories",
      "Ethical Will",
      "Funeral Preferences",
      "Obituary Information",
      "Personal Wishes & Instructions"
    ]
  }

];

let step = 0;
let businessOwner = false;

const ANSWERS = {};

function activePillars(){

  return businessOwner
    ? PILLARS
    : PILLARS.filter(
        p => !p.n.includes("Business Continuity")
      );
}

function calcScoreData(){

  let recorded = 0;
  let na = 0;
  let total = 0;

  activePillars().forEach((pillar,pi)=>{

    pillar.i.forEach((item,ii)=>{

      total++;

      const val =
        ANSWERS[pi + "_" + ii];

      if(val === "R"){
        recorded++;
      }

      if(val === "N"){
        na++;
      }

    });

  });

  const effectiveTotal =
    Math.max(1,total - na);

  const percent =
    Math.round(
      (recorded / effectiveTotal) * 100
    );

  return {
    recorded,
    total,
    na,
    effectiveTotal,
    percent
  };
}

function tierLabel(score){

  if(score >= 86){
    return "Continuity Luminary";
  }

  if(score >= 71){
    return "Continuity Steward";
  }

  if(score >= 61){
    return "Continuity Builder";
  }

  return "Continuity Sentinel";
}

function tierColorClass(score){

  if(score >= 86){
    return "tier-legend";
  }

  if(score >= 71){
    return "tier-stable";
  }

  if(score >= 61){
    return "tier-develop";
  }

  return "tier-risk";
}

function pick(key,val){

  if(ANSWERS[key] === val){

    delete ANSWERS[key];

  }else{

    ANSWERS[key] = val;

  }

  render();
}

function goBack(){

  if(step > 0){

    step--;

    render();
  }
}

function resetAnalysis(){

  Object.keys(ANSWERS).forEach(key=>{

    delete ANSWERS[key];

  });

  businessOwner = false;
  step = 0;

  render();
}

function shareScore(){

  const scoreData =
    calcScoreData();

  const text =
    "My Continuity Readiness score is " +
    scoreData.percent +
    "% (" +
    tierLabel(scoreData.percent) +
    ").";

  if(navigator.share){

    navigator.share({
      title:"7-Pillar Continuity Analysis",
      text:text,
      url:window.location.href
    });

  }else{

    navigator.clipboard.writeText(
      text + " " + window.location.href
    );

    alert(
      "Share message copied."
    );
  }
}

function submitReport(){

  const btn =
    document.getElementById("submitBtn");

  const alertEl =
    document.getElementById("submitAlert");

  const firstName =
    document.getElementById("firstName")
    .value
    .trim();

  const email =
    document.getElementById("email")
    .value
    .trim();

  alertEl.innerHTML = "";

  if(!email){

    alertEl.innerHTML =
      "Email is required to receive your report.";

    return;
  }

  btn.disabled = true;
  btn.innerHTML = "SENDING...";

  const scoreData =
    calcScoreData();

  const strengths = [];
  const gaps = [];
  const pillarBreakdown = [];

  activePillars().forEach((pillar,pi)=>{

    let recorded = 0;
    let unprepared = 0;
    let na = 0;

    pillar.i.forEach((item,ii)=>{

      const val =
        ANSWERS[pi + "_" + ii];

      if(val === "R"){

        recorded++;

        strengths.push({
          pillar:pillar.n,
          item:item
        });
      }

      if(val === "U"){

        unprepared++;

        gaps.push({
          pillar:pillar.n,
          item:item
        });
      }

      if(val === "N"){

        na++;
      }

    });

    const effectiveTotal =
      pillar.i.length - na;

    const percent =
      effectiveTotal > 0
        ? Math.round(
            (recorded / effectiveTotal) * 100
          )
        : 0;

    pillarBreakdown.push({

      pillar:pillar.n,

      recorded:recorded,

      unprepared:unprepared,

      na:na,

      percent:percent

    });

  });

  let recommendation = "";

  if(scoreData.percent < 61){

    recommendation =
      "Focus on centralizing essential household, legal, financial, and digital information into one secure location.";

  }else if(scoreData.percent < 71){

    recommendation =
      "Your foundation is forming well. Prioritize documenting your highest-risk continuity gaps.";

  }else if(scoreData.percent < 86){

    recommendation =
      "Your continuity structure is strong. Focus on maintaining updates and improving accessibility.";

  }else{

    recommendation =
      "You demonstrate exceptional continuity readiness. Maintain regular reviews and trusted access procedures.";

  }

  const payload = {

    submittedAt:
      new Date().toISOString(),

    firstName:firstName,

    email:email,

    score:scoreData.percent,

    recordedItems:
      scoreData.recorded,

    effectiveTotal:
      scoreData.effectiveTotal,

    businessOwner:
      businessOwner ? "Yes" : "No",

    tier:
      tierLabel(scoreData.percent),

    recommendation:
      recommendation,

    strengths:
      strengths,

    gaps:
      gaps,

    pillarBreakdown:
      pillarBreakdown,

    answers:
      ANSWERS

  };

  fetch(WEBHOOK_URL,{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify(payload)

  })
  .then(function(){

    btn.innerHTML =
      "REPORT REQUESTED";

  })
  .catch(function(error){

    console.error(error);

    btn.disabled = false;

    btn.innerHTML =
      "TRY AGAIN";

    alertEl.innerHTML =
      "There was an issue sending your request.";

  });
}

function render(){

  const app =
    document.querySelector("#app");

  if(!app){
    return;
  }

  app.className = "card";

  if(step === 0){

    renderIntro(app);

  }else if(
    step <= activePillars().length
  ){

    renderQuestions(app);

  }else{

    renderResults(app);

  }
}

function renderIntro(app){

  const total =
    activePillars().length + 2;

  app.innerHTML = `

    <div class="stepbar">

      ${
        Array.from(
          {length:total},
          (_,i)=>`
            <div class="seg ${i===0 ? "active" : ""}"></div>
          `
        ).join("")
      }

    </div>

    <div class="header-title">
      7-PILLAR CONTINUITY ANALYSIS
    </div>

    <p class="header-sub">
      Evaluate how prepared your household is to maintain continuity when life changes unexpectedly.
    </p>

    <p class="muted">
      For each item, choose whether it has been recorded, remains unprepared, or does not apply.
    </p>

    <p class="muted" style="margin-top:18px;">
      Do you currently own or operate a business?
    </p>

    <button id="businessBtn">
      CONTINUE AS BUSINESS OWNER
    </button>

    <button class="alt" id="individualBtn">
      CONTINUE AS INDIVIDUAL
    </button>

  `;

  document
    .getElementById("businessBtn")
    .onclick = function(){

      businessOwner = true;
      step = 1;
      render();
    };

  document
    .getElementById("individualBtn")
    .onclick = function(){

      businessOwner = false;
      step = 1;
      render();
    };
}

function renderQuestions(app){

  const pillars =
    activePillars();

  const pillar =
    pillars[step - 1];

  const totalSteps =
    pillars.length + 2;

  let html = `

    <div class="stepbar">

      ${
        Array.from(
          {length:totalSteps},
          (_,i)=>`
            <div class="seg ${i <= step ? "active" : ""}"></div>
          `
        ).join("")
      }

    </div>

    <div class="section-title">
      ${pillar.n}
    </div>

    <p class="muted" style="margin-bottom:14px;">
      Select the option that best reflects the current state of each item.
    </p>

  `;

  pillar.i.forEach(function(item,idx){

    const key =
      (step - 1) + "_" + idx;

    const val =
      ANSWERS[key] || "";

    html += `

      <div class="toggle">

        <div class="row">

          <div class="item-label">
            ${item}
          </div>

          <div class="opts">

            <div
              class="opt ${val==="R" ? "active" : ""}"
              onclick="pick('${key}','R')"
            >
              RECORDED
            </div>

            <div
              class="opt ${val==="U" ? "active" : ""}"
              onclick="pick('${key}','U')"
            >
              UNPREPARED
            </div>

            <div
              class="opt ${val==="N" ? "active" : ""}"
              onclick="pick('${key}','N')"
            >
              N/A
            </div>

          </div>

        </div>

      </div>

    `;
  });

  html += `

    <button id="continueBtn">
      CONTINUE
    </button>

    <div class="nav-row">

      <button
        class="small alt"
        id="backBtn"
      >
        BACK
      </button>

      <button
        class="small alt"
        id="resetBtn"
      >
        RESET
      </button>

    </div>

  `;

  app.innerHTML = html;

  document
    .getElementById("continueBtn")
    .onclick = function(){

      step++;

      window.scrollTo({
        top:0,
        behavior:"smooth"
      });

      render();
    };

  document
    .getElementById("backBtn")
    .onclick = goBack;

  document
    .getElementById("resetBtn")
    .onclick = resetAnalysis;
}

function renderResults(app){

  const scoreData =
    calcScoreData();

  const score =
    scoreData.percent;

  const tier =
    tierLabel(score);

  const tierClass =
    tierColorClass(score);

  const angle =
    Math.round(
      (score / 100) * 360
    );

  app.innerHTML = `

    <div class="ring-wrap">

      <div class="readiness-label">
        CONTINUITY READINESS
      </div>

      <div
        class="ring"
        style="--angle:${angle}deg;"
      >

        <div class="score">
          ${score}%
        </div>

      </div>

    </div>

    <div
      class="${tierClass}"
      style="
        text-align:center;
        font-family:'Cinzel',serif;
        letter-spacing:2px;
        font-size:15px;
        text-transform:uppercase;
        margin-bottom:10px;
      "
    >
      ${tier}
    </div>

    <p
      class="muted"
      style="text-align:center;"
    >
      You have
      ${scoreData.recorded}
      of
      ${scoreData.effectiveTotal}
      applicable items recorded.
    </p>

    <div class="legend-block">

      <div class="legend-row">
        <span class="tier-legend">
          Continuity Luminary
        </span>
        — 86–100%
      </div>

      <div class="legend-row">
        <span class="tier-stable">
          Continuity Steward
        </span>
        — 71–85%
      </div>

      <div class="legend-row">
        <span class="tier-develop">
          Continuity Builder
        </span>
        — 61–70%
      </div>

      <div class="legend-row">
        <span class="tier-risk">
          Continuity Sentinel
        </span>
        — Below 61%
      </div>

    </div>

    <p
      class="muted"
      style="
        margin-top:16px;
        text-align:center;
      "
    >
      Receive a detailed report with actionable next steps.
    </p>

    <div class="input-row">

      <div class="input-field">

        <input
          type="text"
          id="firstName"
          placeholder="First Name (Optional)"
        >

      </div>

      <div class="input-field">

        <input
          type="email"
          id="email"
          placeholder="Email*"
        >

      </div>

    </div>

    <div
      id="submitAlert"
      class="alert"
    ></div>

    <button id="submitBtn">
      REQUEST FULL ANALYSIS REPORT
    </button>

    <div
      class="share-link"
      id="shareBtn"
    >
      <span>Share your score</span>
    </div>

    <div class="nav-row">

      <button
        class="small alt"
        id="backBtn"
      >
        BACK
      </button>

      <button
        class="small alt"
        id="resetBtn"
      >
        RESET
      </button>

    </div>

    <p class="footnote">
      This analysis is for informational purposes only and does not constitute legal or financial advice.
    </p>

  `;

  document
    .getElementById("submitBtn")
    .onclick = submitReport;

  document
    .getElementById("shareBtn")
    .onclick = shareScore;

  document
    .getElementById("backBtn")
    .onclick = goBack;

  document
    .getElementById("resetBtn")
    .onclick = resetAnalysis;
}

document.addEventListener(
  "DOMContentLoaded",
  function(){

    render();

  }
);

</script>

</body>
</html>
