<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Quiet Legacy Continuity Report</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Bodoni+Moda:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
  body {
    margin:0;
    background:#0b0a08;
    color:#f2efe8;
    font-family:'Bodoni Moda', serif;
  }

  #wrap {
    max-width:720px;
    margin:0 auto;
    padding:40px 20px 80px;
  }

  .muted { color:#a89f91; }

  .bar {
    display:flex;
    gap:6px;
    margin:18px 0 28px;
  }

  .seg {
    flex:1;
    height:2px;
    background:#2a241c;
  }

  .seg.active {
    background:#b89a4a;
  }

  .pill {
    margin-bottom:18px;
    border-bottom:1px solid rgba(184,154,74,0.12);
    padding-bottom:14px;
  }

  .item {
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    cursor:pointer;
    opacity:0.9;
  }

  .state {
    width:18px;
    text-align:center;
    color:#b89a4a;
  }

  .na {
    color:#6b645a;
    font-size:12px;
    cursor:pointer;
  }

  .legend-ring {
    border:1px solid #b89a4a;
    padding:22px;
    text-align:center;
    margin:30px 0;
  }

  .score {
    font-size:54px;
    color:#b89a4a;
    font-family:Cinzel;
  }

  button {
    width:100%;
    padding:14px;
    background:#b89a4a;
    border:none;
    font-family:Cinzel;
    letter-spacing:2px;
    cursor:pointer;
  }

  input {
    width:100%;
    padding:12px;
    margin:8px 0;
    background:#0b0a08;
    border:1px solid #2a241c;
    color:#f2efe8;
  }
</style>
</head>

<body>
<div id="wrap">

  <div id="app"></div>

</div>

<script>
const P = [
  {n:"Digital Life", i:["Primary Email Access","Password Manager","Cloud Storage","2-Factor Authentication Keys","Social Media Access","Digital Archive"]},
  {n:"Financial & Assets", i:["Bank Accounts","Investments","Crypto Wallets","","",""]},
  {n:"Household & Property", i:["Deeds","Vehicle Registration","Maintenance Records","Utility Access","",""]},
  {n:"Health & Medical", i:["Insurance","Medical Records","Prescriptions","Directives","",""]},
  {n:"Legal & Estate", i:["Will","Trust","Power of Attorney","Life Insurance","Business Entities",""]},
  {n:"Business Continuity", i:["Entity Docs","Banking","Agreements","Vendor Records","",""]},
  {n:"Legacy & Wishes", i:["Letters","Ethical Will","Funeral Preferences","Obituary","",""]}
];

let ST = Array.from({length:7},()=>Array(6).fill(0));
let NA = Array.from({length:7},()=>Array(6).fill(0));
let page = 0;
let OB = null;

function checked(p){
  return ST[p].reduce((a,v)=>a+v,0);
}

function max(p){
  return 6 - NA[p].reduce((a,v)=>a+v,0);
}

function pct(p){
  let m = max(p);
  return m ? Math.round(checked(p)/m*100) : 0;
}

function toggle(p,i){
  ST[p][i] = ST[p][i] ? 0 : 1;
  if(ST[p][i]) NA[p][i]=0;
  render();
}

function toggleNA(p,i){
  NA[p][i] = NA[p][i] ? 0 : 1;
  if(NA[p][i]) ST[p][i]=0;
  render();
}

function score(){
  let t=0,m=0;
  for(let i=0;i<7;i++){
    t+=checked(i);
    m+=max(i);
  }
  return m?Math.round(t/m*100):0;
}

function tier(s){
  if(s>=86) return "CONTINUITY LEGEND";
  if(s>=71) return "STABLE";
  if(s>=61) return "AT RISK";
  return "CRITICAL";
}

function render(){

  if(page===0){
    document.getElementById("app").innerHTML = `
      <div class="bar">
        ${Array.from({length:7},(_,i)=>`<div class="seg ${i===0?'active':''}"></div>`).join('')}
      </div>

      <div style="font-family:Cinzel;letter-spacing:3px;color:#b89a4a;">STEP 0 — INSTRUCTIONS</div>

      <p class="muted">
        This assessment maps continuity readiness across 7 pillars.
        If unsure whether an item applies, select N/A — it will not affect your score.
      </p>

      <button onclick="page=1;render()">BEGIN</button>
    `;
    return;
  }

  if(page<=7){
    let p = page-1;

    document.getElementById("app").innerHTML = `
      <div class="bar">
        ${Array.from({length:7},(_,i)=>`<div class="seg ${i<p?'active':''}"></div>`).join('')}
      </div>

      <div style="font-family:Cinzel;color:#b89a4a;letter-spacing:3px;">
        PILLAR ${p+1} OF 7
      </div>

      <h2 style="font-family:Cinzel;">${P[p].n}</h2>

      <div class="pill">
        ${P[p].i.map((x,i)=>`
          <div class="item">
            <div onclick="toggle(${p},${i})">
              <span class="state">${ST[p][i]?'●':'○'}</span>
              ${x||""}
            </div>
            <div class="na" onclick="toggleNA(${p},${i})">N/A</div>
          </div>
        `).join('')}
      </div>

      <button onclick="page++;render()">NEXT</button>
    `;
    return;
  }

  let s = score();
  let t = tier(s);
  let legend = s>=86;

  document.getElementById("app").innerHTML = `
    <div class="legend-ring">
      <div class="score">${s}%</div>
      <div style="font-family:Cinzel;letter-spacing:2px;">${t}</div>
    </div>

    <p class="muted">
      ${s>=86
        ? "Continuity systems are fully structured and resilient."
        : s>=71
        ? "Strong foundation with limited structural gaps."
        : s>=61
        ? "Moderate fragmentation across continuity systems."
        : "Significant continuity gaps detected."}
    </p>

    <div style="margin-top:30px;border:1px solid rgba(184,154,74,0.15);padding:18px;">
      <div style="font-family:Cinzel;letter-spacing:2px;margin-bottom:10px;">
        REQUEST FULL CONTINUITY REPORT
      </div>

      <input id="name" placeholder="First name"/>
      <input id="email" placeholder="Email address"/>

      <button onclick="send()">REQUEST REPORT</button>

      <div id="msg" style="margin-top:10px;color:#a89f91;font-size:13px;"></div>
    </div>
  `;
}

async function send(){
  let payload = {
    name:document.getElementById("name").value,
    email:document.getElementById("email").value,
    score:score(),
    tier:tier(score()),
    status: score()>=86 ? "legend" : "standard"
  };

  try{
    await fetch("https://hook.us2.make.com/8sf4ost41gkncwh2tqvspqi5h29ll41b",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });

    document.getElementById("msg").innerText =
      "Report request received. Preparing continuity summary.";

  }catch(e){
    document.getElementById("msg").innerText =
      "Submission failed. Please retry.";
  }
}

render();
</script>

</body>
</html>
