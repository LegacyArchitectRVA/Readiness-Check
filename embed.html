<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Legacy Architect Audit</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,300;1,6..96,400&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      color: #fdfcfa;
      height: 100%;
    }

    #la-wrap {
      background: transparent !important;
      color: #fdfcfa;
      padding: 48px 20px 60px;
      font-family: 'Bodoni Moda', serif;
      box-sizing: border-box;
    }

    /* Prevent any accidental page overflow artifacts */
    body > *:not(#la-wrap) {
      display: none !important;
    }
  </style>
</head>

<body>

  <!-- APP ROOT -->
  <div id="la-wrap">
    <div id="pg1"></div>
    <div id="pg-rest"></div>
  </div>

  <!-- MAIN APP SCRIPT -->
  <script src="audit7.js"></script>

  <!-- SAFE INIT (prevents iframe timing issues in Carrd) -->
  <script>
    (function () {
      function boot() {
        if (window.__la && window.__la.go) {
          try {
            window.__la.go(1);
          } catch (e) {}
        } else {
          setTimeout(boot, 100);
        }
      }

      window.addEventListener("load", boot);
    })();
  </script>

</body>
</html>
