<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Legacy Analysis Audit</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,300;1,6..96,400&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0b0a08;
      color: #fdfcfa;
      font-family: 'Bodoni Moda', serif;
      overflow-x: hidden;
    }

    #la-wrap {
      padding: 40px 18px 60px;
      box-sizing: border-box;
      max-width: 900px;
      margin: 0 auto;
    }

    /* CRITICAL FIX:
       Prevent static Pillar 1 from ever conflicting with JS rendering */
    #pg1 {
      display: none !important;
      visibility: hidden !important;
      height: 0 !important;
      overflow: hidden !important;
      pointer-events: none !important;
    }

    #pg-rest {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.4s ease;
    }

    /* smooth UI base */
    button, input {
      font-family: Cinzel, serif;
    }

    input {
      outline: none;
    }

    /* mobile tuning */
    @media (max-width: 600px) {
      #la-wrap {
        padding: 24px 14px 60px;
      }
    }
  </style>
</head>

<body>

<div id="la-wrap">

  <!--
    IMPORTANT:
    We KEEP pg1 only for compatibility with old Carrd structure,
    but it is fully disabled above.
  -->
  <div id="pg1"></div>

  <!-- JS RENDER TARGET (ALL UI GOES HERE) -->
  <div id="pg-rest"></div>

</div>

<!-- LOAD ENGINE -->
<script src="audit7.js?v=3"></script>

<!-- SAFETY BOOTSTRAP -->
<script>
  (function () {
    function boot() {
      if (!window.__la || !window.__la.go) {
        console.log("Waiting for audit engine...");
        setTimeout(boot, 50);
        return;
      }

      // Force clean start
      try {
        __la.go(0);
      } catch (e) {
        console.log("Boot error:", e);
      }
    }

    window.addEventListener("DOMContentLoaded", function () {
      setTimeout(boot, 80);
    });
  })();
</script>

</body>
</html>
