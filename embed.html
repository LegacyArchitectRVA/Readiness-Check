  <!-- APP ROOT -->
  <div id="la-wrap">
    <div id="pg1"></div>
    <div id="pg-rest"></div>
  </div>

  <!-- MAIN APP SCRIPT -->
  <script src="audit7.js"></script>

  <!-- SAFE INIT (prevents iframe timing issues in Carrd) -->
  <script>
    (function () {
      function boot() {
        if (window.__la && window.__la.go) {
          try {
            window.__la.go(1);
          } catch (e) {}
        } else {
          setTimeout(boot, 100);
        }
      }

      window.addEventListener("load", boot);
    })();
  </script>
