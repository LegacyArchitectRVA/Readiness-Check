<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>7-Post Continuity Analysis</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Bodoni+Moda:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
  body{
    margin:0;
    background:#0a0a08;
    color:#f4f1ea;
    font-family:'Bodoni Moda',serif;
  }

  #wrap{
    max-width:760px;
    margin:0 auto;
    padding:42px 22px 90px;
  }

  /* LIGHTER PREMIUM GOLD */
  :root{
    --gold:#e3cf8a;
    --gold-soft:rgba(227,207,138,0.22);
    --line:#2a241c;
  }

  .gold{color:var(--gold);}

  /* STEP BAR */
  .stepbar{
    display:flex;
    gap:6px;
    margin-bottom:28px;
  }

  .seg{
    flex:1;
    height:2px;
    background:var(--line);
    transition:0.3s;
  }

  .seg.active{
    background:var(--gold);
    box-shadow:0 0 10px var(--gold-soft);
  }

  /* ANALYSIS SELECTOR */
  .toggle{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 12px;
    margin:10px 0;
    border:1px solid var(--line);
    cursor:pointer;
    transition:0.25s;
    background:rgba(0,0,0,0.15);
  }

  .toggle.active{
    border-color:var(--gold);
    box-shadow:0 0 18px var(--gold-soft);
    background:rgba(227,207,138,0.03);
  }

  .state{
    width:110px;
    text-align:right;
    font-size:11px;
    letter-spacing:2px;
    color:#7d7568;
  }

  .state.active{
    color:var(--gold);
  }

  /* FINAL RING */
  .ring{
    width:170px;
    height:170px;
    border-radius:50%;
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:32px auto;
    transition:0.4s;
  }

  .ring.glow{
    border-color:var(--gold);
    box-shadow:
      0 0 18px var(--gold-soft),
      0 0 40px rgba(227,207,138,0.12);
    animation:softPulse 3.2s ease-in-out infinite;
  }

  @keyframes softPulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.015);}
    100%{transform:scale(1);}
  }

  .score{
    font-family:Cinzel;
    font-size:46px;
    color:var(--gold);
    text-shadow:0 0 18px var(--gold-soft);
  }

  button{
    width:100%;
    padding:14px;
    background:var(--gold);
    border:none;
    color:#0a0a08;
    font-family:Cinzel;
    letter-spacing:2px;
    cursor:pointer;
    margin-top:18px;
    transition:0.25s;
  }

  button:hover{
    box-shadow:0 0 18px var(--gold-soft);
    transform:translateY(-1px);
  }

  input{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#0a0a08;
    border:1px solid var(--line);
    color:#f4f1ea;
  }

  .muted{
    color:#a59c8f;
    line-height:1.6;
  }
</style>
</head>

<body>
<div id="wrap">
<div id="app"></div>
</div>

<script>

const P=[
  {n:"Digital Life",i:["Primary Email Access","Password Manager","Cloud Storage","2-Factor Authentication","Social Media Access","Digital Archive"]},
  {n:"Financial & Assets",i:["Bank Accounts","Investments","Crypto Wallets","","",""]},
  {n:"Household & Property",i:["Deeds","Vehicle Registration","Maintenance","Utilities","",""]},
  {n:"Health & Medical",i:["Insurance","Medical Records","Prescriptions","Directives","",""]},
  {n:"Legal & Estate",i:["Will","Trust","Power of Attorney","Life Insurance","Business Entities",""]},
  {n:"Business Continuity",i:["Entity Docs","Banking","Agreements","Vendor Records","",""]},
  {n:"Legacy & Wishes",i:["Letters","Ethical Will","Funeral Preferences","Obituary","",""]}
];

let ST=Array.from({length:7},()=>Array(6).fill(0));
let NA=Array.from({length:7},()=>Array(6).fill(0));
let step=0;
let business=false;

function checked(p){return ST[p].reduce((a,v)=>a+v,0);}
function max(p){return 6-NA[p].reduce((a,v)=>a+v,0);}
function score(){
  let t=0,m=0;
  for(let i=0;i<7;i++){t+=checked(i);m+=max(i);}
  return m?Math.round(t/m*100):0;
}

function tier(s){
  if(s>=86)return"CONTINUITY LEGEND";
  if(s>=71)return"STABLE ANALYSIS";
  if(s>=61)return"AT RISK";
  return"CRITICAL GAPS";
}

function toggle(p,i){
  if(ST[p][i]){
    ST[p][i]=0;
    NA[p][i]=1;
  }else if(NA[p][i]){
    NA[p][i]=0;
  }else{
    ST[p][i]=1;
  }
  render();
}

function render(){

if(step===0){
document.getElementById("app").innerHTML=`
<div class="stepbar">
${Array.from({length:7},(_,i)=>`<div class="seg ${i===0?'active':''}"></div>`).join('')}
</div>

<div class="gold" style="font-family:Cinzel;letter-spacing:3px;">
7-POST CONTINUITY ANALYSIS
</div>

<p class="muted">
This analysis evaluates continuity structure across 7 core life domains.
If uncertain, select N/A — it is excluded from scoring.
</p>

<p class="muted">
<b>Business question:</b><br>
Do you operate a business requiring continuity planning?
</p>

<button onclick="business=true;step=1;render()">CONTINUE AS BUSINESS OWNER</button>
<button onclick="business=false;step=1;render()" style="background:#1b1712;color:var(--gold);border:1px solid var(--line);">
CONTINUE AS INDIVIDUAL
</button>
`;
return;
}

if(step<=7){

let p=step-1;

document.getElementById("app").innerHTML=`
<div class="stepbar">
${Array.from({length:7},(_,i)=>`<div class="seg ${i<p?'active':''}"></div>`).join('')}
</div>

<div class="gold" style="font-family:Cinzel;letter-spacing:3px;">
DOMAIN ${p+1} OF 7 — ANALYSIS
</div>

<h2 style="font-family:Cinzel;">${P[p].n}</h2>

<p class="muted">
If an item is not visible or does not apply, confirm N/A selection.
No assumption is made in scoring.
</p>

${P[p].i.map((x,i)=>`
  <div class="toggle ${(ST[p][i]||NA[p][i])?'active':''}" onclick="toggle(${p},${i})">
    <div>${x||""}</div>
    <div class="state ${(ST[p][i]||NA[p][i])?'active':''}">
      ${ST[p][i]?'RECORDED':NA[p][i]?'NOT APPLICABLE':'SELECT'}
    </div>
  </div>
`).join('')}

<button onclick="step++;render()">CONTINUE</button>
`;
return;
}

/* FINAL */

let s=score();
let t=tier(s);
let legend=s>=86;

document.getElementById("app").innerHTML=`
<div class="ring ${legend?'glow':''}">
  <div class="score">${s}%</div>
</div>

<div style="text-align:center;font-family:Cinzel;letter-spacing:2px;">
${t}
</div>

<p class="muted" style="text-align:center;margin-top:14px;">
${s>=86
?"Fully structured continuity profile across all domains."
:s>=71
?"Strong continuity foundation with limited gaps."
:s>=61
?"Moderate structural fragmentation detected."
:"Significant continuity gaps present."}
</p>

<input id="name" placeholder="First name"/>
<input id="email" placeholder="Email address"/>

<button onclick="send()">REQUEST FULL ANALYSIS REPORT</button>
<div id="msg" class="muted"></div>
`;

}

async function send(){
  let payload={
    name:document.getElementById("name").value,
    email:document.getElementById("email").value,
    score:score(),
    tier:tier(score()),
    business:business,
    mode:"7-post-continuity-analysis"
  };

  await fetch("https://hook.us2.make.com/8sf4ost41gkncwh2tqvspqi5h29ll41b",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });

  document.getElementById("msg").innerText="Analysis request received. Preparing continuity report.";
}

render();

</script>
</body>
</html>
